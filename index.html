<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v1.6.0</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --bsky-blue: #0085ff;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        .header-section { text-align: center; margin-bottom: 40px; }

        #refresh-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }
        #refresh-btn:hover { background-color: #2ea043; }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            width: 100%;
        }

        /* Standard Item (Iframes) */
        .counter-item {
            background: var(--card-bg);
            border-radius: 12px;
            width: 100%;
            height: 160px; 
            overflow: hidden; 
            border: 1px solid var(--border-color);
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Bluesky Custom Card Style */
        .native-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 25px;
        }

        .box-logo {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 22px;
            z-index: 100;
            opacity: 0.9;
        }

        /* Bluesky Butterfly SVG Logo */
        .bsky-svg {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 28px;
            height: 28px;
            fill: var(--bsky-blue);
        }

        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 500px; 
            height: 250px;
            position: absolute;
            top: 5px;      
            left: -88px;  
            transform: scale(1.1); 
            transform-origin: top left;
        }

        /* Specific Labeling */
        .label-group { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .live-status { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #238636;
            border-radius: 50%;
            box-shadow: 0 0 8px #238636;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .main-number {
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1;
            margin: 0;
        }

        /* Goal Bar */
        .goal-track {
            width: 80%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }
        .goal-bar {
            height: 100%;
            background: var(--bsky-blue);
            width: 0%;
            transition: width 1s ease;
        }

        #last-updated { margin-top: 15px; font-size: 14px; color: var(--text-dim); }
        .fa-instagram { color: #E1306C; }
        .fa-youtube { color: #FF0000; }
        .fa-twitch { color: #9146FF; }
        .fa-tiktok { color: #00f2ea; }
        .fa-x-twitter { color: #ffffff; }

        .instagram-fix iframe { top: 35px; left: -80px; transform: scale(1.0); }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Live Social Statistics</h2>
        <button id="refresh-btn" onclick="refreshCounters()">
            <span class="material-symbols-outlined">refresh</span>
            Update All Stats
        </button>
        <div id="last-updated">Never updated</div>
    </div>

    <div class="counter-grid">
        <div class="counter-item native-card">
            <svg class="bsky-svg" viewBox="0 0 566 500" xmlns="http://www.w3.org/2000/svg">
                <path d="M121.2 35.6C191.6 86.9 282.9 178.1 282.9 178.1S374.2 86.9 444.7 35.6C502.9-6.8 566 -20.3 566 49.3c0 19.3-11.2 121.1-17.8 144.6-21 75-101.9 123.7-165.3 111.9 100.2 18.1 121.5 86.4 67.1 140.9-123.1 123.1-167.1-51.4-167.1-51.4s-44 174.5-167.1 51.4C54.5 391.2 75.8 322.9 176 304.8 112.6 316.6 31.7 267.9 10.7 192.9 4.1 169.4-7.1 67.6-7.1 48.3c0-69.6 63.1-56.1 121.2-12.7z"/>
            </svg>
            <div class="label-group">
                <div class="live-dot"></div>
                <span class="live-status">Bluesky Real-Time</span>
            </div>
            <div class="main-number" id="bsky-count">0</div>
            <div class="goal-track"><div id="bsky-bar" class="goal-bar"></div></div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-x-twitter box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-twitch box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-youtube box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-tiktok box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item instagram-fix">
            <i class="fa-brands fa-instagram box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe>
        </div>
    </div>

    <script>
        const BSKY_DID = "did:plc:ziubyammvuvgotfaqgscfny7";
        const BSKY_GOAL = 100; // Set your next milestone here
        let bskyCurrent = 0;

        // --- BLUESKY CORE ---
        async function fetchBskyInitial() {
            try {
                const response = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${BSKY_DID}`);
                const data = await response.json();
                bskyCurrent = data.followersCount;
                updateBskyUI();
                startJetstream();
            } catch (err) {
                console.error("Bluesky fetch failed", err);
            }
        }

        function startJetstream() {
            const ws = new WebSocket(`wss://jetstream1.us-east.bsky.network/subscribe?wantedCollections=app.bsky.graph.follow&wantedDids=${BSKY_DID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.commit?.operation === 'create') {
                    bskyCurrent++;
                    updateBskyUI();
                }
            };
            ws.onclose = () => setTimeout(startJetstream, 5000);
        }

        function updateBskyUI() {
            document.getElementById('bsky-count').innerText = bskyCurrent.toLocaleString();
            const progress = (bskyCurrent / BSKY_GOAL) * 100;
            document.getElementById('bsky-bar').style.width = Math.min(progress, 100) + "%";
        }

        // --- GLOBAL REFRESH ---
        function refreshCounters() {
            // Refresh iframes
            document.querySelectorAll('iframe').forEach(f => f.src = f.src);
            // Refresh Bluesky
            fetchBskyInitial();
            
            const now = new Date();
            document.getElementById('last-updated').innerText = "Last updated at: " + now.toLocaleTimeString();
        }

        // Initialize on load
        fetchBskyInitial();
    </script>
</body>
</html>
