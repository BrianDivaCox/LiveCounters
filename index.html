<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Social Stats v1.9.0</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --accent-green: #238636;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        .version-badge { 
            font-size: 11px; color: var(--text-dim); background: #21262d; 
            padding: 2px 12px; border-radius: 20px; border: 1px solid var(--border-color);
            display: inline-block; margin-bottom: 15px;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; max-width: 1400px; width: 100%;
        }

        .counter-item {
            background: var(--card-bg); border-radius: 12px;
            width: 100%; height: 160px; overflow: hidden; 
            border: 1px solid var(--border-color); position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .box-logo { position: absolute; top: 15px; right: 15px; width: 20px; height: 20px; z-index: 100; }

        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg); border: 0;
            width: 500px; height: 250px; position: absolute;
            top: 5px; left: -88px; transform: scale(1.1); transform-origin: top left;
        }

        /* Native Card (Bluesky & Placeholder) */
        .native-card { display: flex; flex-direction: column; justify-content: center; padding-left: 25px; }
        .label-group { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .live-status { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .live-dot { height: 8px; width: 8px; background-color: #555; border-radius: 50%; }
        .active-dot { background-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .main-number { font-size: 4.5rem; font-weight: 700; line-height: 1; margin: 0; }
        .coming-soon { font-size: 1.5rem; color: var(--text-dim); font-style: italic; }

        #refresh-btn {
            background-color: var(--accent-green); color: white; border: none;
            padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer;
            display: inline-flex; align-items: center; gap: 10px;
        }
        #last-updated { margin-top: 10px; font-size: 12px; color: var(--text-dim); }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Live Social Statistics</h2>
        <div class="version-badge">v1.9.0</div>
        <br>
        <button id="refresh-btn" onclick="refreshCounters()">
            <span class="material-symbols-outlined">refresh</span> Update All Stats
        </button>
        <div id="last-updated">Never updated</div>
    </div>

    <div class="counter-grid">
        <div class="counter-item">
            <svg class="box-logo" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/></svg>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-twitch box-logo" style="color:#9146FF; font-size:20px;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="box-logo" style="display:none;"></div><div class="counter-item">
            <i class="fa-brands fa-youtube box-logo" style="color:#FF0000; font-size:20px;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-tiktok box-logo" style="color:#00f2ea; font-size:20px;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item" style="overflow:hidden;">
            <i class="fa-brands fa-instagram box-logo" style="color:#E1306C; font-size:20px;"></i>
            <iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox" style="top:35px; left:-80px;"></iframe>
        </div>

        <div class="counter-item native-card">
            <svg class="box-logo" viewBox="0 0 566 500" fill="#0085ff"><path d="M121.2 35.6C191.6 86.9 282.9 178.1 282.9 178.1S374.2 86.9 444.7 35.6C502.9-6.8 566 -20.3 566 49.3c0 19.3-11.2 121.1-17.8 144.6-21 75-101.9 123.7-165.3 111.9 100.2 18.1 121.5 86.4 67.1 140.9-123.1 123.1-167.1-51.4-167.1-51.4s-44 174.5-167.1 51.4C54.5 391.2 75.8 322.9 176 304.8 112.6 316.6 31.7 267.9 10.7 192.9 4.1 169.4-7.1 67.6-7.1 48.3c0-69.6 63.1-56.1 121.2-12.7z"/></svg>
            <div class="label-group">
                <div id="bsky-dot" class="live-dot active-dot"></div>
                <span class="live-status">Bluesky Real-Time</span>
            </div>
            <div class="main-number" id="bsky-count">--</div>
        </div>

        <div class="counter-item native-card">
            <i class="fa-brands fa-threads box-logo" style="color:white; font-size:20px;"></i>
            <div class="label-group">
                <div class="live-dot" style="box-shadow:none; background:#444;"></div>
                <span class="live-status">Threads API</span>
            </div>
            <div class="coming-soon">COMING SOON</div>
        </div>
    </div>

    <script>
        const BSKY_HANDLE = "briandivacox.bsky.social";

        async function fetchBluesky() {
            try {
                const response = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${BSKY_HANDLE}`);
                const data = await response.json();
                if (data.followersCount !== undefined) {
                    document.getElementById('bsky-count').innerText = data.followersCount.toLocaleString();
                    document.getElementById('last-updated').innerText = "Last update: " + new Date().toLocaleTimeString();
                }
            } catch (error) {
                console.error("Bluesky fetch failed:", error);
                document.getElementById('bsky-count').innerText = "ERROR";
            }
        }

        function refreshCounters() {
            // Refresh iframes
            document.querySelectorAll('iframe').forEach(iframe => {
                iframe.src = iframe.src;
            });
            // Refresh native data
            fetchBluesky();
        }

        // Initial fetch
        fetchBluesky();
        // Auto-refresh every 60 seconds
        setInterval(fetchBluesky, 60000);
    </script>
</body>
</html>
