<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v2.4.0</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --accent-green: #238636;
            --snap-yellow: #eaff00;
            --threads-purple: #a371f7;
            --bsky-blue: #0085ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            padding: 50px 20px; margin: 0;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Matching your 4-column layout */
            gap: 15px; max-width: 1400px; width: 100%;
        }

        .counter-item {
            background: var(--card-bg); border-radius: 12px; height: 160px; 
            border: 1px solid var(--border-color); position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex;
            flex-direction: column; justify-content: center; padding-left: 20px;
            overflow: hidden;
        }

        .box-logo { position: absolute; top: 15px; right: 15px; font-size: 18px; z-index: 10; }

        /* iFrame specific styles */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg); border: 0; width: 500px; height: 250px;
            position: absolute; top: 5px; left: -88px; transform: scale(1.1); transform-origin: top left;
        }

        /* Label and Text Styling */
        .header-tag { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; display: block; }
        .label-group { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .live-status { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; font-weight: bold; }
        .main-number { font-size: 3.8rem; font-weight: 700; line-height: 1; margin: 0; }

        /* Dot Indicators */
        .dot { height: 6px; width: 6px; border-radius: 50%; display: inline-block; }
        .dot-green { background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); }
        .dot-purple { background: var(--threads-purple); box-shadow: 0 0 5px var(--threads-purple); }
        .dot-blue { background: var(--bsky-blue); box-shadow: 0 0 5px var(--bsky-blue); }

        #last-updated { margin-top: 30px; font-size: 13px; color: var(--text-dim); }
        #refresh-btn { background: var(--accent-green); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <button id="refresh-btn" onclick="location.reload()">Update All Stats</button>

    <div class="counter-grid">
        <div class="counter-item">
            <svg class="box-logo" viewBox="0 0 24 24" fill="white" style="width:18px;"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/></svg>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-twitch box-logo" style="color:#9146FF;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-youtube box-logo" style="color:#FF0000;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-tiktok box-logo" style="color:#00f2ea;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-instagram box-logo" style="color:#E1306C;"></i>
            <iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-solid fa-square-poll-vertical box-logo" style="color:var(--bsky-blue);"></i>
            <div class="label-group">
                <span class="dot dot-blue"></span>
                <span class="live-status">Bluesky API</span>
            </div>
            <div class="main-number">22</div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-threads box-logo" style="color:white;"></i>
            <span class="header-tag">@briandivacox</span>
            <div class="label-group">
                <span class="dot dot-green"></span>
                <span class="live-status">Threads Real-Time</span>
            </div>
            <div id="threads-fol-num" class="main-number">330</div>
        </div>

        <div class="counter-item">
            <span class="material-symbols-outlined box-logo" style="color:var(--threads-purple);">analytics</span>
            <div class="label-group">
                <span class="dot dot-purple"></span>
                <span class="live-status">Threads Total Views</span>
            </div>
            <div id="threads-view-num" class="main-number" style="color:var(--threads-purple)">5.7m</div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-snapchat box-logo" style="color:var(--snap-yellow);"></i>
            <span class="header-tag">briandivacox</span>
            <div class="label-group">
                <span class="dot dot-green"></span>
                <span class="live-status">Snapchat Followers</span>
            </div>
            <div id="snap-fol-num" class="main-number" style="color:var(--snap-yellow)">3,674</div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-facebook box-logo" style="color:var(--bsky-blue);"></i>
            <span class="header-tag">Brian Diva Cox</span>
            <div class="label-group">
                <span class="dot dot-green"></span>
                <span class="live-status">FB Page Followers</span>
            </div>
            <div id="fb-page-num" class="main-number">1k</div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-facebook-f box-logo" style="color:var(--bsky-blue);"></i>
            <span class="header-tag">Brian Diva Cox (Personal)</span>
            <div class="label-group">
                <span class="dot dot-green"></span>
                <span class="live-status">FB Friends</span>
            </div>
            <div id="fb-personal-num" class="main-number">5.5k</div>
        </div>
    </div>

    <div id="last-updated">Status: Operational</div>

    <script>
        function updateDisplay() {
            const rawData = localStorage.getItem('labData');
            if (rawData) {
                const data = JSON.parse(rawData);
                if(document.getElementById('threads-fol-num')) document.getElementById('threads-fol-num').innerText = data.threadsFol || "330";
                if(document.getElementById('threads-view-num')) document.getElementById('threads-view-num').innerText = data.threadsViews || "5.7m";
                if(document.getElementById('snap-fol-num')) document.getElementById('snap-fol-num').innerText = data.snapFol || "3,674";
                if(document.getElementById('fb-page-num')) document.getElementById('fb-page-num').innerText = data.fbPage || "1k";
                if(document.getElementById('fb-personal-num')) document.getElementById('fb-personal-num').innerText = data.fbPersonal || "5.5k";
                document.getElementById('last-updated').innerText = "Last sync: " + new Date().toLocaleTimeString();
            }
        }
        updateDisplay();
        window.addEventListener('storage', (event) => { if (event.key === 'labData') updateDisplay(); });
    </script>
</body>
</html>
