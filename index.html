<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v4.1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --snap-yellow: #eaff00;
        }

        /* FORCE FULL SCREEN - NO SCROLL */
        html, body { 
            height: 100vh; 
            width: 100vw; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* TIMER AREA */
        .timer-container {
            width: 100%;
            height: 35vh; /* Uses 35% of your screen height */
            margin-bottom: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            overflow: hidden;
        }
        .timer-container iframe { width: 100%; height: 100%; border: none; }

        /* THE GRID - 6 COLUMNS */
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            width: 100%;
            flex-grow: 1; /* Takes up remaining space */
        }

        .counter-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        /* ICONS - TOP RIGHT */
        .box-logo {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 16px;
            z-index: 50; /* Ensures it stays above numbers */
        }

        /* IFRAME OVERLAYS (X, IG, TikTok, etc) */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 400px;
            height: 200px;
            position: absolute;
            top: 20px;
            left: -110px;
            transform: scale(0.75);
            transform-origin: top left;
            pointer-events: none;
        }

        /* TEXT STYLING */
        .header-tag { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; font-weight: bold; }
        
        .main-number {
            font-size: 2.1rem; /* Slightly smaller to ensure fit */
            font-weight: 900;
            color: #ffffff;
            margin: 0;
            white-space: nowrap;
            letter-spacing: -1px;
        }

        .version-info { position: fixed; bottom: 5px; right: 10px; font-size: 9px; color: var(--text-dim); }
    </style>
</head>
<body>

    <div class="timer-container">
        <iframe src="https://board.multitimer.net/view/?q=6z0n8w08m0"></iframe>
    </div>
