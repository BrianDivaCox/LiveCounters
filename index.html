<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v1.3.4</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .header-section { text-align: center; margin-bottom: 40px; }

        #refresh-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #161b22;
            border-radius: 12px;
            width: 320px; 
            height: 160px; 
            overflow: hidden; 
            border: 1px solid #30363d;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .box-logo {
            position: absolute !important;
            top: 10px !important;
            right: 10px !important;
            font-size: 22px;
            z-index: 999; 
            pointer-events: none;
            padding: 5px;
            border-radius: 6px;
            background: rgba(22, 27, 34, 0.6);
        }
        
        .fa-instagram { color: #E1306C; }
        .fa-youtube { color: #FF0000; }
        .fa-twitch { color: #9146FF; }
        .fa-tiktok { color: #00f2ea; }
        .fa-x-twitter { color: #ffffff; }

        /* Stable Settings for Twitter, Twitch, YT, TikTok */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 500px; 
            height: 250px;
            position: absolute;
            top: 5px;     
            left: -88px;  
            transform: scale(1.1); 
            transform-origin: top left;
        }

        /* FINAL ADJUSTMENT: Lowered IG significantly to match others */
        .instagram-fix iframe {
            width: 400px; 
            height: 400px;
            top: 28px;    /* Dropped significantly to bury top edge and center number */
            left: -20px;  /* Nudged right for centering */
            transform: scale(1.0); 
        }

        #last-updated { margin-top: 15px; font-size: 14px; color: #8b949e; }
        .version-tag { margin-top: 50px; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Live Social Statistics</h2>
        <button id="refresh-btn" onclick="refreshCounters()">
            <span class="material-symbols-outlined">refresh</span>
            Update All Stats
        </button>
        <div id="last-updated">Never updated</div>
    </div>

    <div class="counter-grid">
