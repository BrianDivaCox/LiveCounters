<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v2.3.0</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --bsky-blue: #0085ff;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --accent-green: #238636;
            --threads-purple: #a371f7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        .version-badge { 
            font-size: 12px; color: var(--text-dim); background: #21262d; 
            padding: 2px 10px; border-radius: 20px; border: 1px solid var(--border-color);
            display: inline-block; margin-bottom: 15px;
        }

        #refresh-btn {
            background-color: var(--accent-green);
            color: white; border: none; padding: 12px 24px; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            display: inline-flex; align-items: center; gap: 10px;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; max-width: 1400px; width: 100%; margin-bottom: 50px;
        }

        .counter-item {
            background: var(--card-bg); border-radius: 12px; width: 100%; height: 160px; 
            overflow: hidden; border: 1px solid var(--border-color); position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            justify-content: center; padding-left: 25px;
        }

        .box-logo { position: absolute; top: 15px; right: 15px; width: 20px; height: 20px; z-index: 100; text-align: right; }

        /* iFrame Specifics */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg); border: 0; width: 500px; height: 250px;
            position: absolute; top: 5px; left: -88px; transform: scale(1.1); transform-origin: top left;
        }

        /* Label and Number Styling */
        .label-group { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .live-status { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .main-number { font-size: 4.5rem; font-weight: 700; line-height: 1; margin: 0; color: #ffffff; }
        .username-tag { font-size: 14px; color: var(--text-dim); margin-bottom: 5px; }

        .live-dot {
            height: 8px; width: 8px; background-color: var(--accent-green);
            border-radius: 50%; box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #last-updated { margin-top: 15px; font-size: 14px; color: var(--text-dim); }
    </style>
</head>
<body>

        <br>

            <span class="material-symbols-outlined">refresh</span>

        <div id="last-updated">Status: Optimal</div>
