<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v1.5.0</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .header-section { text-align: center; margin-bottom: 40px; }

        #refresh-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #161b22;
            border-radius: 12px;
            width: 320px; 
            height: 160px; 
            overflow: hidden; 
            border: 1px solid #30363d;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .box-logo {
            position: absolute !important;
            top: 12px !important;
            right: 12px !important;
            font-size: 20px;
            z-index: 100; 
            pointer-events: none;
            opacity: 0.8;
        }
        
        .fa-instagram { color: #E1306C; }
        .fa-youtube { color: #FF0000; }
        .fa-twitch { color: #9146FF; }
        .fa-tiktok { color: #00f2ea; }
        .fa-x-twitter { color: #ffffff; }
        .fa-bluesky { color: #0085ff; }

        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 500px; 
            height: 250px;
            position: absolute;
            top: 5px;      
            left: -88px;  
            transform: scale(1.1); 
            transform-origin: top left;
        }

        /* NATIVE BLUESKY CARD STYLING */
        .bsky-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding-right: 20px;
        }
        #bsky-count {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
            color: #fff;
        }
        .bsky-label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #238636;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px #238636;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .instagram-fix iframe {
            width: 500px; 
            height: 400px;
            top: 35px;    
            left: -80px;  
            transform: scale(1.0); 
        }

        #last-updated { margin-top: 15px; font-size: 14px; color: #8b949e; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Live Social Statistics</h2>
        <button id="refresh-btn" onclick="refreshCounters()">
            <span class="material-symbols-outlined">refresh</span>
            Update All Stats
        </button>
        <div id="last-updated">Never updated</div>
    </div>

    <div class="counter-grid">
        <div class="counter-item">
            <i class="fa-brands fa-bluesky box-logo"></i>
            <div class="bsky-content">
                <p class="bsky-label"><span class="live-dot"></span>Real-time</p>
                <div id="bsky-count">0</div>
            </div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-x-twitter box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe>
        </div>
        <div class="counter-item">
            <i class="fa-brands fa-twitch box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe>
        </div>
        <div class="counter-item">
            <i class="fa-brands fa-youtube box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe>
        </div>
        <div class="counter-item">
            <i class="fa-brands fa-tiktok box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe>
        </div>
        <div class="counter-item instagram-fix">
            <i class="fa-brands fa-instagram box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe>
        </div>
    </div>

    <script>
        const BSKY_DID = "did:plc:ziubyammvuvgotfaqgscfny7";
        let bskyCurrent = 0;

        // --- BLUESKY LOGIC ---
        async function initBluesky() {
            try {
                const resp = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${BSKY_DID}`);
                const data = await resp.json();
                bskyCurrent = data.followersCount;
                document.getElementById('bsky-count').innerText = bskyCurrent.toLocaleString();
                connectToStream();
            } catch (e) { console.error("BSKY Error:", e); }
        }

        function connectToStream() {
            const socket = new WebSocket(`wss://jetstream1.us-east.bsky.network/subscribe?wantedCollections=app.bsky.graph.follow&wantedDids=${BSKY_DID}`);
            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.commit?.operation === 'create') {
                    bskyCurrent++;
                    document.getElementById('bsky-count').innerText = bskyCurrent.toLocaleString();
                }
            };
            socket.onclose = () => setTimeout(connectToStream, 5000);
        }

        // --- GLOBAL REFRESH ---
        function refreshCounters() {
            const timeDisplay = document.getElementById('last-updated');
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => { iframe.src = iframe.src; });
            
            // Also refresh Bluesky initial count
            initBluesky();

            const now = new Date();
            timeDisplay.innerText = "Last updated at: " + now.toLocaleTimeString();
        }

        // Start Bluesky on Load
        initBluesky();
    </script>

</body>
</html>
