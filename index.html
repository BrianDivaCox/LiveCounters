<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Follower Counter</title>
    <style>
        /* This centers the counter on your page */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5; /* Light grey background */
        }
        .counter-wrapper {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="counter-wrapper">
        <iframe 
            height="80px" 
            width="300px" 
            frameborder="0" 
            src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox" 
            style="border: 0; width:300px; height:80px;">
        </iframe>
    </div>

</body>
</html>
