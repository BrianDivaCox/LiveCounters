<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v1.2.2</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .header-section { text-align: center; margin-bottom: 40px; }

        #refresh-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #161b22;
            border-radius: 12px;
            width: 320px; 
            height: 150px; 
            overflow: hidden; 
            border: 1px solid #30363d;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* FIXED LOGOS: Now floating so they don't push the iframe down */
        .box-logo {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 22px;
            z-index: 100; /* Stays on top */
            pointer-events: none; /* Can't accidentally click it */
        }
        
        .fa-instagram { color: #E1306C; }
        .fa-youtube { color: #FF0000; }
        .fa-twitch { color: #9146FF; }
        .fa-tiktok { color: #00f2ea; }
        .fa-x-twitter { color: #ffffff; }

        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 500px; 
            height: 250px;
            position: absolute;
            /* RE-CENTERED FOR 150px HEIGHT */
            top: -10px;   
            left: -88px;  
            transform: scale(1.1); 
            transform-origin: top left;
        }

        #last-updated { margin-top: 15px; font-size: 14px; color: #8b949e; }
        .version-tag { margin-top: 50px; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Live Social Statistics</h2>
        <button id="refresh-btn" onclick="refreshCounters()">
            <span class="material-symbols-outlined">refresh</span>
            Update All Stats
        </button>
        <div id="last-updated">Never updated</div>
    </div>

    <div class="counter-grid">
        <div class="counter-item">
            <i class="fa-brands fa-x-twitter box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-twitch box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-youtube box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-tiktok box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe>
        </div>
        
        <div class="counter-item">
            <i class="fa-brands fa-instagram box-logo"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/instagram-live-follower-counter/briandivacox"></iframe>
        </div>
    </div>

    <div class="version-tag">v1.2.2-stable (Floating Brand Fix)</div>

    <script>
        function refreshCounters() {
            const btn = document.getElementById('refresh-btn');
            const timeDisplay = document.getElementById('last-updated');
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => { iframe.src = iframe.src; });
            const now = new Date();
            timeDisplay.innerText = "Last updated at: " + now.toLocaleTimeString();
        }
    </script>

</body>
</html>
