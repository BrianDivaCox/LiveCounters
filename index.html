<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian's Command Center v2.4.0</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #0d1117; --card-bg: #161b22; --border-color: #30363d; --text-main: #ffffff; --text-dim: #8b949e; --accent-green: #238636; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .header-section { text-align: center; margin-bottom: 30px; }
        .counter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1400px; width: 100%; }
        .counter-item { background: var(--card-bg); border-radius: 12px; width: 100%; height: 160px; overflow: hidden; border: 1px solid var(--border-color); position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .box-logo { position: absolute; top: 15px; right: 15px; width: 20px; height: 20px; z-index: 100; }
        .counter-item iframe { filter: invert(1) hue-rotate(180deg); border: 0; width: 500px; height: 250px; position: absolute; top: 5px; left: -88px; transform: scale(1.1); transform-origin: top left; }
        .native-card { display: flex; flex-direction: column; justify-content: center; padding-left: 25px; }
        .live-dot { height: 8px; width: 8px; background-color: #555; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .active-dot { background-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .main-number { font-size: 4.5rem; font-weight: 700; line-height: 1; margin: 0; }
        .label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Brian's Social Hub</h2>
        <div style="font-size:11px; color:gray; font-family:monospace;">v2.4.0 (FIXED)</div>
    </div>

    <div class="counter-grid">
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item" style="padding-top:30px;"><iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe></div>

        <div class="counter-item native-card">
            <div class="label"><div class="live-dot active-dot"></div>Bluesky Live</div>
            <div class="main-number" id="bsky-count">0</div>
        </div>

        <div class="counter-item native-card">
            <div class="label"><div id="threads-dot" class="live-dot"></div>Threads API</div>
            <div class="main-number" id="threads-count">--</div>
        </div>
    </div>

    <script>
        const BSKY_DID = "did:plc:ziubyammvuvgotfaqgscfny7";
        // 1. RE-PASTE YOUR 60-DAY TOKEN BELOW
        let THREADS_TOKEN = "THAAg36cTPHF1BUVJmR0xSazU4d3FkSkp6ekJKYmU5SWhLQld1UDJLTlM3S1JjODNtbHNnWXFOcVZAqZAGZAhLTRQWlZAuTHZApMEdRZAzdYeVRSS3ZAiX19rSkVwQkRZAUkQzWnp0Q3F0ckhJSjVmVzdQSnZAKXzFpUm5vNkV2NnNEZAEdHQjUtdwZDZD";

        async function fetchStats() {
            // Bluesky
            try {
                const bRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${BSKY_DID}`);
                const bData = await bRes.json();
                document.getElementById('bsky-count').innerText = bData.followersCount.toLocaleString();
            } catch(e) {}

            // Threads
            try {
                const tRes = await fetch(`https://graph.threads.net/v1.0/me?fields=follower_count&access_token=${THREADS_TOKEN}`);
                const tData = await tRes.json();
                if(tData.follower_count !== undefined) {
                    document.getElementById('threads-count').innerText = tData.follower_count.toLocaleString();
                    document.getElementById('threads-dot').classList.add('active-dot');
                }
            } catch(e) {}
        }

        // Automatic Refresh every 60 seconds
        fetchStats();
        setInterval(fetchStats, 60000);
    </script>
</body>
</html>
