<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v4.2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --snap-yellow: #eaff00;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            padding: 10px; margin: 0;
            height: 100vh; overflow: hidden; /* Strict no-scroll for 1080p */
        }

        /* TIMER AREA - 35% of Screen */
        .timer-container {
            width: 100%;
            max-width: 1880px;
            height: 35vh; 
            margin-bottom: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .timer-container iframe { width: 100%; height: 100%; border: none; }

        /* THE GRID - 6 COLUMNS */
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 1880px;
        }

        .counter-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            height: 120px; /* Precise height to fit 2 rows on 1080p */
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 15px;
            overflow: hidden;
        }

        .box-logo { position: absolute; top: 10px; right: 10px; font-size: 16px; z-index: 20; }

        /* IFRAME POSITIONING FOR X, IG, YT, etc. */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 350px;
            height: 180px;
            position: absolute;
            top: 10px;
            left: -100px;
            transform: scale(0.8);
            transform-origin: top left;
        }
        
        .instagram-fix iframe { top: 35px; left: -90px; transform: scale(0.75); }

        .header-tag { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; font-weight: bold; }
        .main-number { font-size: 2.2rem; font-weight: 900; color: #ffffff; margin: 0; white-space: nowrap; letter-spacing: -1px; }

        .version-info { position: fixed; bottom: 5px;
