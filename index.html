<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Dashboard v6.7.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --border-color: #30363d;
            --text-main: #ffffff; --text-dim: #8b949e; --snap-yellow: #eaff00; --bsky-blue: #1185FE;
            --gold: #FFD700;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .timer-container { width: 100%; max-width: 1400px; height: 300px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        .timer-container iframe { width: 100%; height: 100%; border: none; }
        
        /* GRID ADJUSTED FOR 13 BOXES */
        .counter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 1400px; }
        .counter-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; height: 150px; position: relative; display: flex; flex-direction: column; justify-content: center; padding-left: 20px; overflow: hidden; }
        
        .box-logo { position: absolute; top: 12px; right: 12px; width: 22px; height: 22px; z-index: 20; font-size: 20px; }
        .counter-item iframe { filter: invert(1) hue-rotate(180deg); border: 0; width: 450px; height: 220px; position: absolute; top: 10px; left: -90px; pointer-events: none; }
        .header-tag { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .main-number { font-size: 3.5rem; font-weight: 800; color: #ffffff; margin: 0; white-space: nowrap; letter-spacing: -1px; }
        
        /* GOLD STYLING FOR VISITOR BOXES */
        .gold-text { color: var(--gold) !important; font-family: 'Courier New', monospace; }
        
        .sync-status { margin-top: 20px; display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; background: #444; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #238636; box-shadow: 0 0 8px #238636; }
    </style>
</head>
<body>

    <div class="timer-container"><iframe src="https://board.multitimer.net/view/?q=6z0n8w08m0"></iframe></div>

    <div class="counter-grid">
        <div class="counter-item">
            <i class="fa-solid fa-wand-sparkles box-logo" style="color:var(--gold);"></i>
            <span class="header-tag">Tales Detected (Total)</span>
            <div id="totalViewsCounter" class="main-number gold-text">0</div>
        </div>
        <div class="counter-item">
            <i class="fa-solid fa-users-viewfinder box-logo" style="color:var(--gold);"></i>
            <span class="header-tag">Visitors Online</span>
            <div id="visitorCounter" class="main-number gold-text">0</div>
        </div>

        <div class="counter-item">
            <svg class="box-logo" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/></svg>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe>
        </div>
        <div class="counter-item">
            <i class="fa-brands fa-twitch box-logo" style="color:#9146FF;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe>
        </div>
        <div class="counter-item">
            <svg class="box-logo" viewBox="0 0 566 500" fill="var(--bsky-blue)"><path d="M121.2 35.6C191.6 86.9 282.9 178.1 282.9 178.1S374.2 86.9 444.7 35.6C502.9-6.8 566 -20.3 566 49.3c0 19.3-11.2 121.1-17.8 144.6-21 75-52.2 89.8-118.4 104.8 134.5 25.3 152.9 70.6 152.9 101.7 0 71-65.4 63.3-119 31.9-74.5-43.8-139.8-138.8-179.9-195.1-40.1 56.3-105.4 151.3-179.9 195.1-53.6 31.5-119 39.1-119-31.9 0-31.1 18.4-76.4 152.9-101.7C46.2 283.7 15 268.9 0 193.9c-6.6-23.5-17.8-125.3-17.8-144.6 0-69.6 63.1-56.1 121.2-13.7z"/></svg>
            <span class="header-tag">Bluesky</span>
            <div id="bsky-num" class="main-number">...</div>
        </div>
        <div class="counter-item"><i class="fa-brands fa-threads box-logo" style="color:white;"></i><span class="header-tag">Threads</span><div id="threads-fol-num" class="main-number">---</div></div>
        <div class="counter-item"><i class="fa-brands fa-snapchat box-logo" style="color:var(--snap-yellow);"></i><span class="header-tag">Snapchat</span><div id="snap-fol-num" class="main-number">---</div></div>
    </div>

    <div class="sync-status"><div id="sync-dot" class="dot"></div><span>v6.7.0 • Multi-Project Sync Active</span></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // PROJECT 1: SOCIAL COUNTERS (livecounters-8eaa8)
        const socialConfig = {
            apiKey: atob("QUl6YVN5QXZ4ZktnX3NwUE52RTJ3Y1QtdlRsOFlUUXU0TDN0Xzd3"),
            authDomain: "livecounters-8eaa8.firebaseapp.com",
            projectId: "livecounters-8eaa8",
            databaseURL: "https://livecounters-8eaa8-default-rtdb.firebaseio.com/",
            appId: "1:386919719539:web:c60c0d185c3d7e97ecc006"
        };
        const socialApp = firebase.initializeApp(socialConfig, "socialApp");
        const socialDb = socialApp.database();

        // PROJECT 2: VISITOR COUNTER (lbbb-webcounter)
        const visitorConfig = {
            apiKey: "AIzaSyCokXnEtboNuUIASBMz2ZzS0GuchemoJYI",
            authDomain: "lbbb-webcounter.firebaseapp.com",
            projectId: "lbbb-webcounter",
            databaseURL: "https://lbbb-webcounter-default-rtdb.firebaseio.com/",
            appId: "1:217634980859:web:49ef2b0aa7fe7d0bb1415e"
        };
        const visitorApp = firebase.initializeApp(visitorConfig, "visitorApp");
        const visitorDb = visitorApp.database();

        // --- SOCIAL LOGIC ---
        socialDb.ref('labData').on('value', (s) => {
            const d = s.val();
            if (d) {
                if(d.threadsFol) document.getElementById('threads-fol-num').innerText = d.threadsFol;
                if(d.snapFol) document.getElementById('snap-fol-num').innerText = d.snapFol;
                flashDot();
            }
        });

        // --- VISITOR LOGIC ---
        const totalViewsRef = visitorDb.ref("totalViewCount");
        const visitorsConnectedRef = visitorDb.ref("visitorsConnected");
        
        // Increment total views on load
        totalViewsRef.transaction((current) => (current || 0) + 1);

        // Track live visitors
        visitorDb.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                const vRef = visitorsConnectedRef.push(true);
                vRef.onDisconnect().remove();
            }
        });

        // Display visitor stats
        totalViewsRef.on("value", (snap) => document.getElementById("totalViewsCounter").innerText = snap.val() || 0);
        visitorsConnectedRef.on("value", (snap) => document.getElementById("visitorCounter").innerText = snap.numChildren() || 0);

        function flashDot() {
            document.getElementById('sync-dot').classList.add('active');
            setTimeout(() => document.getElementById('sync-dot').classList.remove('active'), 1500);
        }
    </script>
</body>
</html>
