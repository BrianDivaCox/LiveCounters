<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Social Live Counter</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212; /* Dark theme looks better for counters */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        h2 { color: #ffffff; margin-bottom: 30px; }

        /* This creates a grid layout for the 5 items */
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 300px;
            height: 80px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <h2>Live Social Stats</h2>

    <div class="counter-grid">
        <div class="counter-item">
            <iframe height="80px" width="300px" frameborder="0" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox" style="border: 0;"></iframe>
        </div>

        <div class="counter-item">
            <iframe height="80px" width="300px" frameborder="0" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox" style="border: 0;"></iframe>
        </div>

        <div class="counter-item">
            <iframe height="80px" width="300px" frameborder="0" src="https://livecounts.io/embed/youtube-live-subscriber-counter/briandivacox" style="border: 0;"></iframe>
        </div>

        <div class="counter-item">
            <iframe height="80px" width="300px" frameborder="0" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox" style="border: 0;"></iframe>
        </div>

        <div class="counter-item">
            <iframe height="80px" width="300px" frameborder="0" src="https://livecounts.io/embed/instagram-live-follower-counter/briandivacox" style="border: 0;"></iframe>
        </div>
    </div>

</body>
</html>
