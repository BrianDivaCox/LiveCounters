<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Command Center v7.2.6</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .header-section { text-align: center; margin-bottom: 40px; }

        #refresh-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #161b22;
            border-radius: 12px;
            width: 320px; 
            height: 160px; 
            overflow: hidden; 
            border: 1px solid #30363d;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .box-logo {
            position: absolute !important;
            top: 12px !important;
            right: 12px !important;
            font-size: 20px;
            z-index: 100; 
            pointer-events: none;
            opacity: 0.8;
        }

        /* COURT ALERT STYLES */
        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #30363d;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #484f58;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.live {
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .status-text { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #8b949e; }

        /* IFRAME POSITIONING (v1.4.0 Coordinates) */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 500px; 
            height: 250px;
            position: absolute;
            top: 5px;     
            left: -88px;  
            transform: scale(1.1); 
            transform-origin: top left;
        }

        .instagram-fix iframe {
            width: 500px; 
            height: 400px;
            top: 35px;    
            left: -80px;  
            transform: scale(1.0); 
        }

        #last-updated { margin-top: 15px; font-size: 14px; color: #8b949e; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Live Command Center</h2>
        <button id="refresh-btn" onclick="refreshAll()">
            <span class="material-symbols-outlined">refresh</span>
            Refresh All Data
        </button>
        <div id="last-updated">Status: Synced (v7.2.6)</div>
    </div>

    <div class="counter-grid">
        <div class="counter-item">
            <i class="fa-brands fa-x-twitter box-logo" style="color: #ffffff;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-twitch box-logo" style="color: #9146FF;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-youtube box-logo" style="color: #FF0000;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-tiktok box-logo" style="color: #00f2ea;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item instagram-fix">
            <i class="fa-brands fa-instagram box-logo" style="color: #E1306C;"></i>
            <iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe>
        </div>

        <div class="counter-item" style="background: linear-gradient(145deg, #1c2128, #161b22);">
            <i class="fa-solid fa-gavel box-logo" style="color: #d29922;"></i>
            <div style="padding: 20px;">
                <h4 style="margin: 0; color: #c9d1d9;">Court Stream</h4>
                <p style="font-size: 13px; color: #8b949e; margin-top: 5px;">Judge David</p>
            </div>
            <div class="status-container">
                <span id="live-dot" class="dot"></span>
                <span id="status-label" class="status-text">OFF AIR</span>
            </div>
        </div>
    </div>

    <script>
        async function checkCourtStatus() {
            const dot = document.getElementById('live-dot');
            const label = document.getElementById('status-label');
            const statusPageUrl = 'https://stats.uptimerobot.com/KytOwDWn6R/802886200'; 
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(statusPageUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                if (data.contents.includes('Operational') || data.contents.includes('bg-success')) {
                    dot.classList.add('live');
                    label.innerText = "LIVE NOW";
                    label.style.color = "#ff0000";
                } else {
                    dot.classList.remove('live');
                    label.innerText = "OFF AIR";
                    label.style.color = "#8b949e";
                }
            } catch (e) { console.log("Checking status..."); }
        }

        function refreshAll() {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => { iframe.src = iframe.src; });
            checkCourtStatus();
            document.getElementById('last-updated').innerText = "Last updated: " + new Date().toLocaleTimeString();
        }

        window.onload = refreshAll;
        setInterval(checkCourtStatus, 60000);
    </script>
</body>
</html>
