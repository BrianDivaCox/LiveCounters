<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v1.1.5</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            color: white;
        }

        .header-section { text-align: center; margin-bottom: 30px; }

        #refresh-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-loading { background-color: #0969da !important; pointer-events: none; }
        .btn-loading span { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            max-width: 1200px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #161b22;
            border-radius: 10px;
            width: 280px; 
            height: 90px; /* SHRUNK: Removed dead space */
            overflow: hidden; 
            border: 1px solid #30363d;
            position: relative;
        }

        /* Settings for Twitter, Twitch, YT, TikTok */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 400px; 
            height: 180px;
            position: absolute;
            top: -22px;   /* PULLED UP: Kills dead space at top */
            left: -75px;  
            transform: scale(1.1); 
            transform-origin: top left;
        }

        /* Settings for Instagram (nl provider) */
        .instagram-fix iframe {
            filter: invert(1) hue-rotate(180deg);
            width: 380px; 
            height: 300px;
            top: -55px;   /* AGGRESSIVE PULL: Kills the nl provider's dead space */
            left: -40px;  
            transform: scale(1.0);
        }

        #last-updated { margin-top: 15px; font-size: 13px; color: #8b949e; }
        .version-tag { margin-top: 40px; font-size: 11px; color: #484f58; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Live Social Statistics</h2>
        <button id="refresh-btn" onclick="refreshCounters()">
            <span class="material-symbols-outlined">refresh</span>
            Update All Stats
        </button>
        <div id="last-updated">Never updated</div>
    </div>

    <div class="counter-grid">
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe></div>
        
        <div class="counter-item instagram-fix">
            <iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe>
        </div>
    </div>

    <div class="version-tag">v1.1.5-stable (Compact Mode)</div>

    <script>
        function refreshCounters() {
            const btn = document.getElementById('refresh-btn');
            const timeDisplay = document.getElementById('last-updated');
            const iframes = document.querySelectorAll('iframe');
            btn.classList.add('btn-loading');
            iframes.forEach(iframe => { iframe.src = iframe.src; });
            const now = new Date();
            timeDisplay.innerText = "Last updated at: " + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            setTimeout(() => { btn.classList.remove('btn-loading'); }, 1000);
        }
    </script>

</body>
</html>
