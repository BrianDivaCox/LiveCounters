<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Dashboard v7.1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --border-color: #30363d;
            --text-main: #ffffff; --text-dim: #8b949e; --snap-yellow: #eaff00; --bsky-blue: #1185FE;
            --light-purple: #bc95ff; --plex-orange: #e5a00d;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .timer-container { width: 100%; max-width: 1400px; height: 300px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        .timer-container iframe { width: 100%; height: 100%; border: none; }
        .counter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 1400px; }
        .counter-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; height: 150px; position: relative; display: flex; flex-direction: column; justify-content: center; padding-left: 20px; overflow: hidden; }
        .box-logo { position: absolute; top: 12px; right: 12px; width: 22px; height: 22px; z-index: 20; font-size: 20px; }
        .header-tag { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; font-weight: bold; }
        .main-number { font-size: 3.5rem; font-weight: 800; color: #ffffff; margin: 0; white-space: nowrap; letter-spacing: -1px; }

        /* MULTI-STAT MIRROR BOX */
        .mirror-box { justify-content: space-evenly !important; padding-left: 0 !important; text-align: center; }
        .mirror-row { display: flex; justify-content: space-around; width: 100%; margin-top: 5px; }
        .mirror-label { font-size: 9px; color: var(--light-purple); text-transform: uppercase; font-weight: bold; margin: 0; }
        .mirror-stat { font-size: 2rem; font-weight: 800; color: #ffffff; margin-bottom: 2px; }
        .plex-label { color: var(--plex-orange) !important; }
    </style>
</head>
<body>

    <div class="timer-container"><iframe src="https://board.multitimer.net/view/?q=6z0n8w08m0"></iframe></div>

    <div class="counter-grid">
        <div class="counter-item mirror-box">
            <i class="fa-solid fa-wand-magic-sparkles box-logo" style="color:var(--light-purple);"></i>
            <div>
                <p class="mirror-label">✨ Tales Detected</p>
                <div id="totalViewsCounter" class="mirror-stat" style="font-size: 2.5rem;">0</div>
            </div>
            <div class="mirror-row">
                <div>
                    <p class="mirror-label">👥 Online</p>
                    <div id="visitorCounter" class="mirror-stat">0</div>
                </div>
                <div>
                    <p class="mirror-label plex-label">🎬 Plex</p>
                    <div id="plex-count-num" class="mirror-stat">0</div>
                </div>
            </div>
        </div>

        <div class="counter-item">
            <svg class="box-logo" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/></svg>
            <iframe scrolling="no" style="filter: invert(1) hue-rotate(180deg); border: 0; width: 450px; height: 220px; position: absolute; top: 10px; left: -90px; pointer-events: none;" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe>
        </div>
        </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script>
        // CONFIGS REMAIN THE SAME AS v6.9.1
        // ... (Include your Firebase init logic here) ...

        // UPDATED SOCIAL LISTENER
        sDb.ref('labData').on('value', (s) => {
            const d = s.val();
            if (d) {
                document.getElementById('threads-fol-num').innerText = d.threadsFol || "---";
                document.getElementById('threads-view-num').innerText = d.threadsViews || "---";
                document.getElementById('snap-fol-num').innerText = d.snapFol || "---";
                document.getElementById('fb-page-num').innerText = d.fbPage || "---";
                document.getElementById('fb-personal-num').innerText = d.fbPersonal || "---";
                document.getElementById('plex-count-num').innerText = d.plexCount || "0"; // NEW PLEX LINE
                flash();
            }
        });
        // ... (Include your Visitor and Bluesky logic here) ...
    </script>
</body>
</html>
