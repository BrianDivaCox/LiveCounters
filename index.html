<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v1.0.4</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        #refresh-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-loading {
            background-color: #0969da !important;
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-loading span {
            animation: spin 1s linear infinite;
        }

        #last-updated {
            margin-top: 15px;
            font-size: 14px;
            color: #8b949e;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1100px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #161b22;
            border-radius: 12px;
            width: 320px;
            /* Height increased to 120px to show numbers without scrolling */
            height: 120px; 
            overflow: hidden;
            border: 1px solid #30363d;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 300px;
            height: 120px; /* Matched height */
        }

        /* Version Tag */
        .version-tag {
            margin-top: 50px;
            font-size: 12px;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Live Social Statistics</h2>
        <button id="refresh-btn" onclick="refreshCounters()">
            <span class="material-symbols-outlined">refresh</span>
            Update All Stats
        </button>
        <div id="last-updated">Never updated</div>
    </div>

    <div class="counter-grid">
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/instagram-live-follower-counter/briandivacox"></iframe></div>
    </div>

    <div class="version-tag">v1.0.4-stable</div>

    <script>
        function refreshCounters() {
            const btn = document.getElementById('refresh-btn');
            const timeDisplay = document.getElementById('last-updated');
            const iframes = document.querySelectorAll('iframe');

            btn.classList.add('btn-loading');

            iframes.forEach(iframe => {
                iframe.src = iframe.src;
            });

            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            timeDisplay.innerText = "Last updated at: " + timeString;

            setTimeout(() => {
                btn.classList.remove('btn-loading');
            }, 1000);
        }
    </script>

</body>
</html>
