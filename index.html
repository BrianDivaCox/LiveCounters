<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v1.1.4</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .header-section { text-align: center; margin-bottom: 40px; }

        #refresh-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-loading { background-color: #0969da !important; pointer-events: none; }
        .btn-loading span { animation: spin 1s linear infinite; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 20px;
            max-width: 1300px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #161b22;
            border-radius: 12px;
            width: 310px; 
            height: 110px; 
            overflow: hidden; 
            border: 1px solid #30363d;
            position: relative;
        }

        /* Default settings for livecounts.io boxes */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 450px; 
            height: 200px;
            position: absolute;
            top: -5px;    /* Moved down slightly to show "Followers" label */
            left: -84px;  /* Kept hidden profile pic */
            transform: scale(1.05); /* Reduced scale slightly for better fit */
            transform-origin: top left;
        }

        /* CUSTOM SETTINGS FOR INSTAGRAM (livecounts.nl) */
        .instagram-fix iframe {
            filter: invert(1) hue-rotate(180deg); /* Added missing invert */
            width: 400px; 
            height: 350px;
            top: -35px;   /* Lowered significantly from -70px to show text */
            left: -45px;  /* Nudged left to center numbers */
            transform: scale(0.9); /* Shrunk slightly to fit the taller layout */
        }

        #last-updated { margin-top: 15px; font-size: 14px; color: #8b949e; }
        .version-tag { margin-top: 50px; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Live Social Statistics</h2>
        <button id="refresh-btn" onclick="refreshCounters()">
            <span class="material-symbols-outlined">refresh</span>
            Update All Stats
        </button>
        <div id="last-updated">Never updated</div>
    </div>

    <div class="counter-grid">
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe></div>
        <div class="counter-item"><iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe></div>
        
        <div class="counter-item instagram-fix">
            <iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe>
        </div>
    </div>

    <div class="version-tag">v1.1.4-stable (Label Visibility Fix)</div>

    <script>
        function refreshCounters() {
            const btn = document.getElementById('refresh-btn');
            const timeDisplay = document.getElementById('last-updated');
            const iframes = document.querySelectorAll('iframe');
            btn.classList.add('btn-loading');
            iframes.forEach(iframe => { iframe.src = iframe.src; });
            const now = new Date();
            timeDisplay.innerText = "Last updated at: " + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            setTimeout(() => { btn.classList.remove('btn-loading'); }, 1000);
        }
    </script>

</body>
</html>
