<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian's Command Center v2.5.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --green: #238636; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        
        /* Fixed Box Styling */
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; height: 180px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; padding-left: 30px; }
        
        /* Iframe Positioning (The "Hacker" Way) */
        .box iframe { position: absolute; top: -50px; left: -90px; width: 600px; height: 300px; filter: invert(1) hue-rotate(180deg); transform: scale(0.9); pointer-events: none; }
        
        /* Native Stats (Threads/Bluesky) */
        .stat-label { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .stat-num { font-size: 4rem; font-weight: 800; line-height: 1; margin: 0; }
        .dot { width: 8px; height: 8px; background: #333; border-radius: 50%; }
        .active { background: var(--green); box-shadow: 0 0 10px var(--green); }
        
        .logo-icon { position: absolute; top: 15px; right: 15px; font-size: 20px; opacity: 0.5; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 30px;">Social Dashboard <small style="font-size: 12px; opacity: 0.5;">v2.5.0</small></h1>

    <div class="grid">
        <div class="box"><i class="fa-brands fa-x-twitter logo-icon"></i><iframe src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe></div>
        <div class="box"><i class="fa-brands fa-twitch logo-icon"></i><iframe src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe></div>
        <div class="box"><i class="fa-brands fa-youtube logo-icon"></i><iframe src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe></div>
        <div class="box"><i class="fa-brands fa-tiktok logo-icon"></i><iframe src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe></div>
        
        <div class="box">
            <i class="fa-solid fa-cloud logo-icon" style="color:#0085ff"></i>
            <div class="stat-label"><div class="dot active"></div> Bluesky Followers</div>
            <div class="stat-num" id="bsky-count">0</div>
        </div>

        <div class="box">
            <i class="fa-brands fa-threads logo-icon"></i>
            <div class="stat-label"><div id="t-dot" class="dot"></div> Threads Followers</div>
            <div class="stat-num" id="threads-count">--</div>
        </div>
    </div>

    <script>
        const BSKY_ID = "did:plc:ziubyammvuvgotfaqgscfny7";
        const T_TOKEN = "THAAg36cTPHF1BUVJmR0xSazU4d3FkSkp6ekJKYmU5SWhLQld1UDJLTlM3S1JjODNtbHNnWXFOcVZAqZAGZAhLTRQWlZAuTHZApMEdRZAzdYeVRSS3ZAiX19rSkVwQkRZAUkQzWnp0Q3F0ckhJSjVmVzdQSnZAKXzFpUm5vNkV2NnNEZAEdHQjUtdwZDZD";

        async function updateData() {
            // Bluesky
            try {
                const b = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${BSKY_ID}`);
                const bd = await b.json();
                document.getElementById('bsky-count').innerText = bd.followersCount.toLocaleString();
            } catch(e) { console.log("Bsky blocked by CORS? Run on a server!"); }

            // Threads
            try {
                const t = await fetch(`https://graph.threads.net/v1.0/me?fields=follower_count&access_token=${T_TOKEN}`);
                const td = await t.json();
                if(td.follower_count !== undefined) {
                    document.getElementById('threads-count').innerText = td.follower_count.toLocaleString();
                    document.getElementById('t-dot').classList.add('active');
                }
            } catch(e) { console.log("Threads blocked by CORS?"); }
        }

        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
