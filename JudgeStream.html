<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Court System v7.7.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --border-color: #30363d;
            --text-main: #ffffff; --text-dim: #8b949e; --plex-orange: #e5a00d;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .counter-item { 
            background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; 
            width: 320px; height: 160px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; padding-left: 25px;
            transition: all 0.5s ease;
        }
        .box-logo { position: absolute; top: 15px; right: 20px; font-size: 22px; color: var(--plex-orange); }
        .court-name { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: bold; margin: 0; letter-spacing: 1px; }
        .system-title { font-size: 24px; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }
        .status-container { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .dot { height: 10px; width: 10px; background-color: #484f58; border-radius: 50%; }
        .dot.live { background-color: #ff0000; box-shadow: 0 0 12px #ff0000; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-text { font-size: 12px; font-weight: bold; color: var(--text-dim); text-transform: uppercase; }
        #debug-msg { position: absolute; bottom: 25px; left: 25px; font-size: 8px; color: #30363d; font-family: monospace; }
        #court-iframe { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        .version { position: absolute; bottom: 8px; right: 12px; font-size: 9px; color: #30363d; font-weight: bold; }
    </style>
</head>
<body>

    <div class="counter-item" id="court-box">
        <i class="fa-solid fa-gavel box-logo"></i>
        <div class="status-header">
            <p class="court-name">Judge David</p>
            <h4 class="system-title">Court Stream</h4>
        </div>
        <div class="status-container">
            <span id="court-dot" class="dot"></span>
            <span id="court-text" class="status-text">OFF AIR</span>
        </div>
        <div id="debug-msg">Waiting for Signal...</div>
        <iframe id="court-iframe" src="https://video.ibm.com/embed/23891775?autoplay=true&volume=0&api=1" allow="autoplay"></iframe>
        <div class="version">v7.7.0</div>
    </div>

    <script>
        const box = document.getElementById('court-box');
        const dot = document.getElementById('court-dot');
        const text = document.getElementById('court-text');
        const debug = document.getElementById('debug-msg');
        const iframe = document.getElementById('court-iframe');

        function updateStatus(isLive) {
            if (isLive) {
                dot.classList.add('live');
                text.innerText = "LIVE NOW";
                text.style.color = "#ff0000";
                box.style.borderColor = "#ff0000";
            } else {
                dot.classList.remove('live');
                text.innerText = "OFF AIR";
                text.style.color = "var(--text-dim)";
                box.style.borderColor = "var(--border-color)";
            }
        }

        window.addEventListener('message', function(event) {
            try {
                const data = JSON.parse(event.data);
                debug.innerText = "Signal Recv: " + (data.event || data.cmd || "Property");

                // Check for every possible way IBM reports 'live'
                if (data.event === 'live') {
                    updateStatus(data.args[0] === true || data.args[0] === 'live');
                } else if (data.property === 'live' || (data.args && data.args[0] === 'live')) {
                    updateStatus(data.value === true || data.result === true || data.value === 'live');
                }
            } catch (e) {}
        });

        // The "Handshake"
        function pingIBM() {
            if (iframe.contentWindow) {
                // Sending both common command formats
                iframe.contentWindow.postMessage(JSON.stringify({cmd: 'getProperty', args: ['live']}), '*');
                iframe.contentWindow.postMessage(JSON.stringify({call: 'getProperty', args: ['live']}), '*');
            }
        }

        setInterval(pingIBM, 10000);
        iframe.onload = pingIBM;
    </script>
</body>
</html>
