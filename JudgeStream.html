<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Dashboard v7.8.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --border-color: #30363d;
            --text-main: #ffffff; --text-dim: #8b949e; --snap-yellow: #eaff00; --bsky-blue: #1185FE;
            --light-purple: #bc95ff; --plex-orange: #e5a00d; --cinema-green: #238636;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; overflow-x: hidden; }

        /* Top Stage (Timer) */
        .timer-stage { 
            width: 100%; max-width: 1400px; height: 195px; 
            margin-bottom: 25px; border-radius: 12px; border: 1px solid var(--border-color); 
            overflow: hidden; background: #000; position: relative;
        }
        .timer-stage iframe { 
            width: 100%; height: 350px; border: none; 
            position: absolute; top: -92px; left: 0; border-radius: 12px;
        }

        .counter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 1400px; }

        .counter-item { 
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; 
            height: 150px; position: relative; display: flex; flex-direction: column; 
            justify-content: center; padding-left: 25px; padding-bottom: 10px; overflow: hidden; 
        }

        .box-logo { position: absolute; top: 12px; right: 15px; width: 22px; height: 22px; z-index: 20; font-size: 20px; }

        /* Counter Embeds */
        .counter-item iframe { filter: invert(1) hue-rotate(180deg); border: 0; width: 450px; height: 220px; position: absolute; top: 10px; left: -85px; pointer-events: none; }
        
        .header-tag { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .main-number { font-size: 3.1rem; font-weight: 800; color: #ffffff; margin: 0; white-space: nowrap; letter-spacing: -2px; line-height: 1.1; }
        
        .mirror-box { justify-content: space-evenly !important; padding-left: 0 !important; text-align: center; }
        .mirror-row { display: flex; justify-content: space-around; width: 100%; margin-top: 5px; }
        .mirror-label { font-size: 9px; color: var(--light-purple); text-transform: uppercase; font-weight: bold; margin: 0; }
        .mirror-stat { font-size: 2rem; font-weight: 800; color: #ffffff; margin-bottom: 2px; }

        /* Status Dot */
        .status-container { display: flex; align-items: center; gap: 8px; position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border-color); }
        .dot { height: 8px; width: 8px; background-color: #484f58; border-radius: 50%; }
        .dot.live { background-color: #ff0000; box-shadow: 0 0 8px #ff0000; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-text { font-size: 10px; font-weight: bold; color: var(--text-dim); }

        /* Cinema Hub */
        .cinema-info { padding: 12px 20px 12px 15px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px; height: 100%; text-align: left; }
        .cinema-label { font-size: 9px; color: var(--cinema-green); text-transform: uppercase; font-weight: bold; }
        .cinema-title { font-size: 13px; font-weight: bold; color: #ffffff; line-height: 1.2; margin-top: 2px; height: 32px; overflow: hidden; }
        .cinema-footer { position: absolute; bottom: 0; left: 0; right: 0; background: #0d1117; padding: 6px 12px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .cinema-stats-line { font-size: 10px; color: var(--plex-orange); display: flex; justify-content: space-between; font-weight: bold; }
    </style>
</head>
<body>

    <div class="timer-stage">
        <iframe src="https://board.multitimer.net/view/?q=6z0n8w08m0"></iframe>
    </div>

    <div class="counter-grid">
