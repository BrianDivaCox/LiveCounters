<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Court Box Standalone v7.8.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #ffffff; --orange: #ffb515; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .counter-item { 
            background: var(--card); border: 2px solid #30363d; border-radius: 12px; 
            width: 320px; height: 160px; position: relative; padding-left: 25px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .box-logo { position: absolute; top: 15px; right: 20px; font-size: 24px; color: var(--orange); }
        .dot { height: 12px; width: 12px; background: #484f58; border-radius: 50%; display: inline-block; }
        .dot.live { background: #ff0000; box-shadow: 0 0 10px #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        #sync-time { position: absolute; bottom: 8px; right: 12px; font-size: 9px; color: #30363d; }
    </style>
</head>
<body>
    <div class="counter-item" id="court-box">
        <i class="fa-solid fa-gavel box-logo"></i>
        <p style="font-size: 11px; color: var(--orange); font-weight: bold; margin: 0;">JUDGE DAVID</p>
        <h4 style="font-size: 26px; margin: 5px 0;">Court Stream</h4>
        <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
            <span id="court-dot" class="dot"></span>
            <span id="court-text" style="font-size: 14px; font-weight: bold; color: #8b949e;">OFF AIR</span>
        </div>
        <div id="sync-time">v7.8.2</div>
    </div>

    <script>
        async function check() {
            const api = 'YOUR_NEW_DEPLOYED_URL_HERE'; // <--- PASTE NEW URL HERE
            try {
                const res = await fetch(api + '?t=' + Date.now());
                const data = await res.json();
                const dot = document.getElementById('court-dot');
                const txt = document.getElementById('court-text');
                const box = document.getElementById('court-box');
                
                if (data.judgeLive) {
                    dot.className = 'dot live';
                    txt.innerText = "LIVE NOW"; txt.style.color = "#ff3333";
                    box.style.borderColor = "#ff3333";
                } else {
                    dot.className = 'dot';
                    txt.innerText = "OFF AIR"; txt.style.color = "#8b949e";
                    box.style.borderColor = "#30363d";
                }
                document.getElementById('sync-time').innerText = "Last Sync: " + new Date().toLocaleTimeString();
            } catch (e) { document.getElementById('sync-time').innerText = "Sync Error"; }
        }
        setInterval(check, 30000);
        check();
    </script>
</body>
</html>
