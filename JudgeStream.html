<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Court System v7.7.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117; 
            --card-bg: #161b22; 
            --border-inactive: #30363d;
            --text-bright: #ffffff; /* Pure white for readability */
            --text-dim: #c9d1d9;    /* Light grey instead of dark grey */
            --plex-orange: #ffb515; /* Brightened orange */
            --status-off: #8b949e;
            --debug-yellow: #eaff00;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-bright); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .counter-item { 
            background: var(--card-bg); border: 2px solid var(--border-inactive); border-radius: 12px; 
            width: 320px; height: 160px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; padding-left: 25px;
            transition: all 0.3s ease;
        }

        .box-logo { position: absolute; top: 15px; right: 20px; font-size: 24px; color: var(--plex-orange); }

        .court-name { font-size: 12px; color: var(--plex-orange); text-transform: uppercase; font-weight: bold; margin: 0; letter-spacing: 1.5px; }
        .system-title { font-size: 26px; font-weight: 800; margin: 5px 0; letter-spacing: -1px; color: var(--text-bright); }

        .status-container { display: flex; align-items: center; gap: 10px; margin-top: 8px; background: rgba(0,0,0,0.3); width: fit-content; padding: 5px 12px; border-radius: 20px; }
        .dot { height: 12px; width: 12px; background-color: var(--status-off); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
        
        /* High-Vis Live State */
        .dot.live { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        .status-text { font-size: 14px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; }

        /* Debug text - High Visibility */
        #debug-msg { position: absolute; bottom: 28px; left: 25px; font-size: 10px; color: var(--debug-yellow); font-family: 'Courier New', monospace; font-weight: bold; }
        
        #court-iframe { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        .version { position: absolute; bottom: 8px; right: 12px; font-size: 10px; color: #484f58; font-weight: bold; }
    </style>
</head>
<body>

    <div class="counter-item" id="court-box">
        <i class="fa-solid fa-gavel box-logo"></i>
        <div class="status-header">
            <p class="court-name">Judge David</p>
            <h4 class="system-title">Court Stream</h4>
        </div>
        <div class="status-container">
            <span id="court-dot" class="dot"></span>
            <span id="court-text" class="status-text">OFF AIR</span>
        </div>
        <div id="debug-msg">SCANNING...</div>
        <iframe id="court-iframe" src="https://video.ibm.com/embed/23891775?autoplay=true&volume=0&api=1" allow="autoplay"></iframe>
        <div class="version">v7.7.1</div>
    </div>

    <script>
        const box = document.getElementById('court-box');
        const dot = document.getElementById('court-dot');
        const text = document.getElementById('court-text');
        const debug = document.getElementById('debug-msg');
        const iframe = document.getElementById('court-iframe');

            if (isLive) {

                box.style.background = "#1a0505"; // Dark red tint
            } else {

                text.innerText = "OFF AIR";
