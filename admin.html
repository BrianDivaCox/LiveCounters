<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Admin | Brian Diva Cox</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .admin-card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #0f0; border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 14px; }
        button:hover { background: #2ea043; transform: scale(1.02); }
        .label { font-size: 11px; text-transform: uppercase; color: #8b949e; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">Lab Command Center</h2>

    <div class="admin-card">
        <div class="label">Threads Followers</div>
        <input type="text" id="threads-fol" placeholder="e.g. 330">
        
        <div class="label">Threads Lifetime Views</div>
        <input type="text" id="threads-views" placeholder="e.g. 1.2M">

        <div class="label">Snapchat Followers</div>
        <input type="text" id="snap-fol" placeholder="e.g. 5,400">

        <button onclick="broadcast()">PUSH TO INDEX</button>
        <p style="font-size: 10px; color: #8b949e; text-align: center; margin-top: 15px;">
            Changes will reflect on index.html instantly.
        </p>
    </div>

    <script>
        // Load existing values if they exist
        window.onload = function() {
            const raw = localStorage.getItem('labData');
            if(raw) {
                const data = JSON.parse(raw);
                document.getElementById('threads-fol').value = data.threadsFol || "";
                document.getElementById('threads-views').value = data.threadsViews || "";
                document.getElementById('snap-fol').value = data.snapFol || "";
            }
        };

        function broadcast() {
            const data = {
                threadsFol: document.getElementById('threads-fol').value,
                threadsViews: document.getElementById('threads-views').value,
                snapFol: document.getElementById('snap-fol').value
            };
            localStorage.setItem('labData', JSON.stringify(data));
            alert("Data Sent to Index!");
        }
    </script>
</body>
</html>
