<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Command Center (Admin)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 15px; width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #0f0; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #2ea043; }
        .hint { font-size: 12px; color: #8b949e; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <h2>COMMAND CENTER</h2>
    <div class="card">
        <label>Threads Followers</label>
        <input type="text" id="threads-fol" placeholder="e.g. 330">
        
        <label>Threads Lifetime Views</label>
        <input type="text" id="threads-views" placeholder="e.g. 1.2M">

        <label>Snapchat Followers</label>
        <input type="text" id="snap-fol" placeholder="e.g. 5.4K">

        <button onclick="saveData()">BROADCAST TO MASTER</button>
        <div class="hint">Updates will show on the Master Page instantly.</div>
    </div>

    <script>
        function saveData() {
            const data = {
                threadsFol: document.getElementById('threads-fol').value,
                threadsViews: document.getElementById('threads-views').value,
                snapFol: document.getElementById('snap-fol').value
            };
            // Save to browser memory
            localStorage.setItem('labData', JSON.stringify(data));
            alert("Broadcast Sent!");
        }
    </script>
</body>
</html>
