<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Admin v3.1.0 | Brian Diva Cox</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .admin-card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        .row { margin-bottom: 12px; }
        .label { font-size: 10px; text-transform: uppercase; color: #8b949e; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #0f0; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: monospace; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .section-title { border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 15px; color: #58a6ff; font-size: 14px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 15px;">Cloud Command</h2>

    <div class="admin-card">
        <div class="section-title">Threads & Snapchat</div>
        <div class="row"><span class="label">Threads Followers</span><input type="text" id="threads-fol" placeholder="e.g. 330"></div>
        <div class="row"><span class="label">Threads Views</span><input type="text" id="threads-views" placeholder="e.g. 5.7M"></div>
        <div class="row"><span class="label">Snapchat</span><input type="text" id="snap-fol" placeholder="e.g. 3,674"></div>

        <div class="section-title">Facebook</div>
        <div class="row"><span class="label">FB Page</span><input type="text" id="fb-page" placeholder="1K"></div>
        <div class="row"><span class="label">FB Personal</span><input type="text" id="fb-personal" placeholder="5.5K"></div>

        <button id="push-btn">PUSH TO CLOUD</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsTv2YBsOHdfBeV1aZ1upwPPqmuSbhK7U",
            authDomain: "livecounters-8eaa8.firebaseapp.com",
            projectId: "livecounters-8eaa8",
            storageBucket: "livecounters-8eaa8.firebasestorage.app",
            messagingSenderId: "386919719539",
            appId: "1:386919719539:web:c60c0d185c3d7e97ecc006"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('push-btn').addEventListener('click', () => {
            const data = {
                threadsFol: document.getElementById('threads-fol').value,
                threadsViews: document.getElementById('threads-views').value,
                snapFol: document.getElementById('snap-fol').value,
                fbPage: document.getElementById('fb-page').value,
                fbPersonal: document.getElementById('fb-personal').value
            };

            set(ref(db, 'labData'), data)
                .then(() => alert("Cloud Sync Successful!"))
                .catch((err) => alert("Error: " + err));
        });
    </script>
</body>
</html>
