<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Command Center v7.4.3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://video.ibm.com/embed-api/v1/ustream-embedapi.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #161b22;
            border-radius: 12px;
            width: 320px; 
            height: 160px; 
            overflow: hidden; 
            border: 1px solid #30363d;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .box-logo {
            position: absolute !important;
            top: 12px !important;
            right: 12px !important;
            font-size: 20px;
            z-index: 100; 
            opacity: 0.8;
            pointer-events: none;
        }

        /* STATUS DOT */
        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #30363d;
        }

        .dot { height: 10px; width: 10px; background-color: #484f58; border-radius: 50%; display: inline-block; }
        .dot.live { background-color: #ff0000; box-shadow: 0 0 10px #ff0000; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .status-text { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #8b949e; }

        /* IFRAMES (Counters) */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 500px; height: 250px;
            position: absolute;
            top: 5px; left: -88px;  
            transform: scale(1.1); transform-origin: top left;
        }

        .instagram-fix iframe { width: 500px; height: 400px; top: 35px; left: -80px; transform: scale(1.0); }

        /* MOVIE TRACKER (J4:L5) */
        .movie-info { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 100%; }
        .movie-col { display: flex; flex-direction: column; }
        .movie-label { font-size: 10px; color: #2ea043; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .movie-title { font-size: 13px; font-weight: bold; margin-top: 4px; color: #ffffff; line-height: 1.2; }
        .movie-meta { font-size: 11px; color: #8b949e; margin-top: 4px; }
        .movie-stats { font-size: 10px; color: #d29922; margin-top: auto; border-top: 1px solid #30363d; padding-top: 5px; }
    </style>
</head>
