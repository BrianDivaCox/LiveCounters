<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Dashboard v7.6.6</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --border-color: #30363d;
            --text-main: #ffffff; --text-dim: #8b949e; --plex-orange: #e5a00d; --cinema-green: #238636;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; }

        .counter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 900px; margin-top: 20px; }
        .counter-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; position: relative; min-height: 140px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .full-width { grid-column: span 2; }

        .box-logo { position: absolute; top: 15px; right: 15px; font-size: 20px; color: var(--plex-orange); }
        .header-tag { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: bold; margin-bottom: 10px; display: block; }
        .main-val { font-size: 28px; font-weight: 800; color: #ffffff; margin: 5px 0; }
        
        /* Cinema Specifics */
        .cinema-info { display: flex; justify-content: space-between; gap: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px; }
        .cinema-col { flex: 1; }
        .cinema-label { font-size: 10px; color: var(--cinema-green); font-weight: bold; text-transform: uppercase; }
        .cinema-title { font-size: 18px; font-weight: 800; margin-top: 5px; height: 24px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .cinema-stats-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: var(--plex-orange); }
        #sync-timer { color: var(--cinema-green); }
    </style>
</head>
<body>

    <div class="counter-grid">
        
        <div class="counter-item">
            <i class="fa-solid fa-wand-magic-sparkles box-logo" style="color:#bc95ff;"></i>
            <span class="header-tag">Tales Detected</span>
            <div id="totalViewsCounter" class="main-val">0</div>
            <div style="font-size: 12px; color: var(--text-dim);">Live Visitors: <span id="visitorCounter" style="color:white;">0</span></div>
        </div>

        <div class="counter-item">
            <i class="fa-solid fa-play box-logo"></i>
            <span class="header-tag">Plex Activity</span>
            <div id="plex-count-num" class="main-val">0</div>
            <div style="font-size: 12px; color: var(--text-dim);">Active Streams</div>
        </div>

        <div class="counter-item full-width">
            <i class="fa-solid fa-film box-logo" style="color: var(--cinema-green);"></i>
            <span class="header-tag">Cinema Status</span>
            
            <div class="cinema-info">
                <div class="cinema-col">
                    <div class="cinema-label">Now Playing</div>
                    <div id="m-now" class="cinema-title">Syncing...</div>
                    <div id="m-left" style="font-size: 11px; color: var(--text-dim);">--:-- remaining</div>
                </div>
                <div class="cinema-col" style="border-left: 1px solid var(--border-color); padding-left: 15px;">
                    <div class="cinema-label" style="color: var(--plex-orange);">Up Next</div>
                    <div id="m-next" class="cinema-title">--</div>
                    <div id="m-time" style="font-size: 11px; color: var(--text-dim);">Starts at --</div>
                </div>
            </div>

            <div class="cinema-stats-row">
                <span>Movies: <span id="m-count">0</span></span>
                <span>TV: <span id="tv-count">0</span></span>
                <span>Days Online: <span id="m-open">0</span></span>
                <span>Sync in: <span id="sync-timer">60</span>s</span>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script>
        const sConf = { apiKey: atob("QUl6YVN5QXZ4ZktnX3NwUE52RTJ3Y1QtdlRsOFlUUXU0TDN0Xzd3"), authDomain: "livecounters-8eaa8.firebaseapp.com", projectId: "livecounters-8eaa8", databaseURL: "https://livecounters-8eaa8-default-rtdb.firebaseio.com/", appId: "1:386919719539:web:c60c0d185c3d7e97ecc006" };
        const vConf = { apiKey: "AIzaSyCokXnEtboNuUIASBMz2ZzS0GuchemoJYI", authDomain: "lbbb-webcounter.firebaseapp.com", projectId: "lbbb-webcounter", databaseURL: "https://lbbb-webcounter-default-rtdb.firebaseio.com/", appId: "1:217634980859:web:49ef2b0aa7fe7d0bb1415e" };
        const sApp = firebase.initializeApp(sConf, "sApp");
        const vApp = firebase.initializeApp(vConf, "vApp");
        const sDb = sApp.database();
        const vDb = vApp.database();

        vDb.ref("totalViewCount").on("value", s => document.getElementById("totalViewsCounter").innerText = s.val() || 0);
        vDb.ref("visitorsConnected").on("value", s => document.getElementById("visitorCounter").innerText = s.numChildren() || 0);
        sDb.ref('labData/plexCount').on('value', s => document.getElementById('plex-count-num').innerText = s.val() || 0);

        let countdown = 60;
        async function syncCinema() {
            const api = 'https://script.google.com/macros/s/AKfycbxvKbJqw6_JoYtWlKwV1t5Kav2w4HBRrtxsZUU-PzkAPxd7kd_tWuj165mLhkwLfhE/exec';
            try {
                const res = await fetch(api + '?t=' + Date.now());
                const d = await res.json();
                document.getElementById('m-now').innerText = d.nowPlaying || "Offline";
                document.getElementById('m-left').innerText = (d.timeLeft || "--") + " remaining";
                document.getElementById('m-count').innerText = d.moviesCount || "0";
                document.getElementById('tv-count').innerText = d.tvCount || "0";
                document.getElementById('m-next').innerText = d.nextTitle || "None";
                document.getElementById('m-time').innerText = "Starts at " + (d.nextTime || "--");
                document.getElementById('m-open').innerText = d.daysOpen || "0";
                countdown = 60;
            } catch (e) { 
                document.getElementById('m-now').innerText = "Sync Error"; 
            }
        }

        setInterval(() => {
            countdown--;
            if (countdown <= 0) { syncCinema(); countdown = 60; }
            document.getElementById('sync-timer').innerText = countdown;
        }, 1000);

        syncCinema(); 
    </script>
</body>
</html>
