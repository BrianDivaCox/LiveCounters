<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Command Center v7.5.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script data-cfasync="false" src="https://video.ibm.com/embed-api/v1/ustream-embedapi.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d1117; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; margin: 0; color: white; }
        .counter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1400px; width: 100%; justify-items: center; }
        .counter-item { background: #161b22; border-radius: 12px; width: 320px; height: 160px; overflow: hidden; border: 1px solid #30363d; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .box-logo { position: absolute !important; top: 12px !important; right: 12px !important; font-size: 20px; z-index: 100; opacity: 0.8; }
        
        .status-container { display: flex; align-items: center; gap: 10px; position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 20px; border: 1px solid #30363d; }
        .dot { height: 10px; width: 10px; background-color: #484f58; border-radius: 50%; display: inline-block; }
        .dot.live { background-color: #ff0000; box-shadow: 0 0 10px #ff0000; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .status-text { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #8b949e; }

        /* Social Embed Nudges */
        .counter-item iframe { filter: invert(1) hue-rotate(180deg); border: 0; width: 500px; height: 250px; position: absolute; top: 5px; left: -88px; transform: scale(1.1); transform-origin: top left; pointer-events: none; }
        .instagram-fix iframe { width: 500px; height: 400px; top: 35px; left: -80px; transform: scale(1.0); }

        /* Movie Tracker Box */
        .movie-info { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 100%; }
        .movie-col { display: flex; flex-direction: column; }
        .movie-label { font-size: 10px; color: #2ea043; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .movie-title { font-size: 13px; font-weight: bold; margin-top: 4px; color: #ffffff; line-height: 1.2; height: 32px; overflow: hidden; }
        .movie-meta { font-size: 11px; color: #8b949e; margin-top: 4px; }
        .movie-stats { font-size: 10px; color: #d29922; margin-top: auto; border-top: 1px solid #30363d; padding-top: 5px; }
    </style>
</head>
<body>

    <div class="counter-grid">
        <div class="counter-item"><i class="fa-brands fa-x-twitter box-logo"></i><iframe src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><i class="fa-brands fa-twitch box-logo" style="color:#9146FF"></i><iframe src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><i class="fa-brands fa-youtube box-logo" style="color:#FF0000"></i><iframe src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe></div>
        <div class="counter-item"><i class="fa-brands fa-tiktok box-logo" style="color:#00f2ea"></i><iframe src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item instagram-fix"><i class="fa-brands fa-instagram box-logo" style="color:#E1306C"></i><iframe src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe></div>

        <div class="counter-item" style="background: #1c2128;">
            <i class="fa-solid fa-gavel box-logo" style="color: #d29922;"></i>
            <div style="padding: 20px;"><h4>Court Stream</h4><p style="font-size: 13px; color: #8b949e;">Judge David</p></div>
            <iframe id="court-player" src="https://video.ibm.com/embed/23891775" style="display:none;"></iframe>
            <div class="status-container"><span id="live-dot" class="dot"></span><span id="status-label" class="status-text">OFF AIR</span></div>
        </div>

        <div class="counter-item" style="border-color: #238636;">
            <i class="fa-solid fa-film box-logo" style="color: #238636;"></i>
            <div class="movie-info">
                <div class="movie-col">
                    <div class="movie-label">Now Playing</div>
                    <div id="cell-now" class="movie-title">Refreshing...</div>
                    <div id="cell-left" class="movie-meta">--:--</div>
                    <div id="cell-stats" class="movie-stats">Dashboard v7.5.1</div>
                </div>
                <div class="movie-col" style="border-left: 1px solid #30363d; padding-left: 10px;">
                    <div class="movie-label" style="color: #d29922;">Up Next</div>
                    <div id="cell-next" class="movie-title">--</div>
                    <div id="cell-time" class="movie-meta">--</div>
                </div>
            </div>
        </div>

        <div class="counter-item"><div style="padding:20px; color:#484f58;">[Box 8]</div></div>
        <div class="counter-item"><div style="padding:20px; color:#484f58;">[Box 9]</div></div>
        <div class="counter-item"><div style="padding:20px; color:#484f58;">[Box 10]</div></div>
        <div class="counter-item"><div style="padding:20px; color:#484f58;">[Box 11]</div></div>
        <div class="counter-item"><div style="padding:20px; color:#484f58;">[Box 12]</div></div>
    </div>

    <script data-cfasync="false">
        // IBM Court Status
        function startCourtMonitor() {
            if (window.UstreamEmbed) {
                const viewer = UstreamEmbed('court-player');
                viewer.addListener('live', (isLive) => {
                    const dot = document.getElementById('live-dot');
                    const label = document.getElementById('status-label');
                    if (isLive === true || isLive === 'live') {
                        dot.classList.add('live'); label.innerText = "LIVE NOW"; label.style.color = "#ff0000";
                    } else {
                        dot.classList.remove('live'); label.innerText = "OFF AIR"; label.style.color = "#8b949e";
                    }
                });
            } else {
                setTimeout(startCourtMonitor, 1000);
            }
        }

        // Movie Data Push
        async function fetchMovieData() {
            const api = 'https://script.google.com/macros/s/AKfycbxvKbJqw6_JoYtWlKwV1t5Kav2w4HBRrtxsZUU-PzkAPxd7kd_tWuj165mLhkwLfhE/exec';
            try {
                const res = await fetch(api + '?cache=' + Date.now());
                const data = await res.json();
                document.getElementById('cell-now').innerText = data.nowPlaying || "None";
                document.getElementById('cell-left').innerText = "Left: " + (data.timeLeft || "--");
                document.getElementById('cell-stats').innerText = "Movies: " + (data.moviesTv || "-") + " | Day: " + (data.daysOpen || "-");
                document.getElementById('cell-next').innerText = data.nextTitle || "--";
                document.getElementById('cell-time').innerText = data.nextTime || "--";
            } catch (e) {
                document.getElementById('cell-now').innerText = "Update Error";
            }
        }

        // Initialize
        startCourtMonitor();
        fetchMovieData();
        setInterval(fetchMovieData, 30000); // 30 second refresh
    </script>
</body>
</html>
