<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Dashboard v3.9.0</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --accent-green: #238636;
            --bsky-blue: #0085ff;
            --snap-yellow: #eaff00;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 5px; /* Reduced side padding to maximize width */
            margin: 0;
            overflow: hidden;
        }

        .timer-container {
            width: 100%;
            max-width: 1900px;
            height: 280px; 
            margin-bottom: 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .timer-container iframe { width: 100%; height: 100%; border: none; }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px; 
            max-width: 1900px; 
            width: 100%;
            container-type: inline-size; /* Allows the numbers to scale based on box width */
        }

        .counter-item {
            background: var(--card-bg); 
            border-radius: 8px; 
            height: 125px; 
            border: 1px solid var(--border-color); 
            position: relative;
            display: flex;
            flex-direction: column; 
            justify-content: center; 
            padding: 0 10px; 
            overflow: hidden;
        }

        .box-logo { position: absolute; top: 8px; right: 8px; font-size: 14px; z-index: 10; }

        /* IFRAME FORCE SCALE */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg); border: 0; 
            width: 320px; height: 160px; 
            position: absolute; 
            top: 25px; 
            left: -105px; 
            transform: scale(0.75); /* Scaled down further to prevent cutoff */
            transform-origin: top left;
        }
        
        .instagram-fix iframe { top: 40px; left: -95px; transform: scale(0.7); }

        .header-tag { font-size: 9px; color: var(--text-dim); margin-bottom: 2px; text-transform: uppercase; font-weight: 800; }
        
        /* THE FIX: FLUID TEXT SIZE */
        .main-number { 
            font-size: clamp(1.5rem, 6cqw, 2.1rem); /* Dynamically shrinks if the millions get too long */
            font-weight: 900; 
            line-height: 1; 
            margin: 0; 
            color: #ffffff;
            white-space: nowrap;
            letter-spacing: -1px; /* Tightens the numbers up */
        }

        .version-info { position: fixed; bottom: 5px; left: 10px; font-size: 8px; color: var(--text-dim); opacity: 0.3; }
    </style>
</head>
<body>

    <div class="timer-container">
        <iframe src="https://board.multitimer.net/view/?q=m1quw3bc6g" scrolling="no"></iframe>
    </div>

    <div class="counter-grid">
        <div class="counter-item">
            <svg class="box-logo" viewBox="0 0 24 24" fill="white" style="width:14px;"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/></svg>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-twitch box-logo" style="color:#9146FF;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-youtube box-logo" style="color:#FF0000;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-tiktok box-logo" style="color:#00f2ea;"></i>
            <iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe>
        </div>

        <div class="counter-item instagram-fix">
            <i class="fa-brands fa-instagram box-logo" style="color:#E1306C;"></i>
            <iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe>
        </div>

        <div class="counter-item">
            <svg class="box-logo" viewBox="0 0 566 500" fill="#0085ff" style="width:14px;"><path d="M121.2 35.6C191.6 86.9 282.9 178.1 282.9 178.1S374.2 86.9 444.7 35.6C502.9-6.8 566 -20.3 566 49.3c0 19.3-11.2 121.1-17.8 144.6-21 75"/></svg>
            <span class="header-tag">Bluesky</span>
            <div class="main-number">22</div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-threads box-logo" style="color:white;"></i>
            <span class="header-tag">Threads</span>
            <div id="threads-fol-num" class="main-number">330</div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-threads box-logo" style="color:white;"></i>
            <span class="header-tag">Total Views</span>
            <div id="threads-view-num" class="main-number">5.7m</div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-snapchat box-logo" style="color:var(--snap-yellow);"></i>
            <span class="header-tag">Snapchat</span>
            <div id="snap-fol-num" class="main-number" style="color:#ffffff">3,674</div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-facebook box-logo" style="color:var(--bsky-blue);"></i>
            <span class="header-tag">Brian Diva Cox</span>
            <div id="fb-page-num" class="main-number">1k</div>
        </div>

        <div class="counter-item">
            <i class="fa-brands fa-facebook-f box-logo" style="color:var(--bsky-blue);"></i>
            <span class="header-tag">Brian Diva Cox (Personal)</span>
            <div id="fb-personal-num" class="main-number">5.5k</div>
        </div>
    </div>

    <div class="version-info">v3.9.0 • Emergency Scale</div>

    <script>
        function updateDisplay() {
            const rawData = localStorage.getItem('labData');
            if (rawData) {
                const data = JSON.parse(rawData);
                if(document.getElementById('threads-fol-num')) document.getElementById('threads-fol-num').innerText = data.threadsFol || "330";
                if(document.getElementById('threads-view-num')) document.getElementById('threads-view-num').innerText = data.threadsViews || "5.7m";
                if(document.getElementById('snap-fol-num')) document.getElementById('snap-fol-num').innerText = data.snapFol || "3,674";
                if(document.getElementById('fb-page-num')) document.getElementById('fb-page-num').innerText = data.fbPage || "1k";
                if(document.getElementById('fb-personal-num')) document.getElementById('fb-personal-num').innerText = data.fbPersonal || "5.5k";
            }
        }
        updateDisplay();
        window.addEventListener('storage', (event) => { if (event.key === 'labData') updateDisplay(); });
    </script>
</body>
</html>
