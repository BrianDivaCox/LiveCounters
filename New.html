<script>
    // SCRIPT URLs (Separated for stability)
    const twitchLabApi = 'https://script.google.com/macros/s/AKfycby0ndGELJv0Q6yAR8PKMsvo3u-hZ2qAL80sVahxyeyrLy_qDXhkcYZkKBoq6HhdrhyO/exec';
    const cinemaMasterApi = 'https://script.google.com/macros/s/AKfycbxvKbJqw6_JoYtWlKwV1t5Kav2w4HBRrtxsZUU-PzkAPxd7kd_tWuj165mLhkwLfhE/exec';

    let syncCount = 60;

    async function syncTwitch() {
        try {
            const res = await fetch(twitchLabApi + '?t=' + Date.now(), { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            document.getElementById('twitch-fol-num').innerText = data.twitch.followers;
        } catch (e) { console.error("Twitch Sync Failed"); }
    }

    async function syncCinema() {
        try {
            const res = await fetch(cinemaMasterApi + '?t=' + Date.now(), { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            const m = data.movie;
            document.getElementById('m-now').innerText = m.nowPlaying;
            document.getElementById('m-count').innerText = m.moviesCount;
            document.getElementById('tv-count').innerText = m.tvCount;
            document.getElementById('m-next').innerText = m.nextTitle;
            document.getElementById('m-open').innerText = m.daysOpen;
            // ... (Your existing countdown timer logic here) ...
        } catch (e) { console.error("Cinema Sync Failed"); }
    }

    async function syncMaster() {
        syncTwitch();
        syncCinema();
        syncCount = 60; 
    }

    setInterval(() => { 
        syncCount--; 
        if (syncCount <= 0) syncMaster(); 
        document.getElementById('sync-timer').innerText = syncCount; 
    }, 1000);

    syncMaster(); // Run immediately on load
</script>
