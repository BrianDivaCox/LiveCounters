<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Command Center v7.2.8</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://video.ibm.com/embed-api/v1/ustream-embedapi.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            justify-items: center;
        }

        .counter-item {
            background: #161b22;
            border-radius: 12px;
            width: 320px; 
            height: 160px; 
            overflow: hidden; 
            border: 1px solid #30363d;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .box-logo {
            position: absolute !important;
            top: 12px !important;
            right: 12px !important;
            font-size: 20px;
            z-index: 100; 
            pointer-events: none;
            opacity: 0.8;
        }

        /* STATUS DOT */
        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #30363d;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #484f58;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.live {
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .status-text { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #8b949e; }

        /* IFRAME COORDINATES */
        .counter-item iframe {
            filter: invert(1) hue-rotate(180deg);
            border: 0;
            width: 500px; height: 250px;
            position: absolute;
            top: 5px; left: -88px;  
            transform: scale(1.1); transform-origin: top left;
        }

        .instagram-fix iframe {
            width: 500px; height: 400px;
            top: 35px; left: -80px;  
            transform: scale(1.0); 
        }
    </style>
</head>
<body>

    <div class="counter-grid">
        <div class="counter-item"><i class="fa-brands fa-x-twitter box-logo"></i><iframe scrolling="no" src="https://livecounts.io/embed/twitter-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><i class="fa-brands fa-twitch box-logo" style="color:#9146FF"></i><iframe scrolling="no" src="https://livecounts.io/embed/twitch-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item"><i class="fa-brands fa-youtube box-logo" style="color:#FF0000"></i><iframe scrolling="no" src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCMuv7PfbLVm8IZsd6Bgqqzg"></iframe></div>
        <div class="counter-item"><i class="fa-brands fa-tiktok box-logo" style="color:#00f2ea"></i><iframe scrolling="no" src="https://livecounts.io/embed/tiktok-live-follower-counter/briandivacox"></iframe></div>
        <div class="counter-item instagram-fix"><i class="fa-brands fa-instagram box-logo" style="color:#E1306C"></i><iframe scrolling="no" src="https://livecounts.nl/instagram-realtime/embed/?u=briandivacox"></iframe></div>

        <div class="counter-item" style="background: linear-gradient(145deg, #1c2128, #161b22);">
            <i class="fa-solid fa-gavel box-logo" style="color: #d29922;"></i>
            <div style="padding: 20px;">
                <h4 style="margin: 0; color: #c9d1d9;">Court Stream</h4>
                <p style="font-size: 13px; color: #8b949e; margin-top: 5px;">Judge David</p>
            </div>
            
            <iframe id="court-player" src="https://video.ibm.com/embed/23891775" style="display:none;"></iframe>
            
            <div class="status-container">
                <span id="live-dot" class="dot"></span>
                <span id="status-label" class="status-text">OFF AIR</span>
            </div>
        </div>
    </div>

    <script>
        const viewer = UstreamEmbed('court-player');

        viewer.addListener('live', (isLive) => {
            const dot = document.getElementById('live-dot');
            const label = document.getElementById('status-label');
            
            if (isLive === true || isLive === 'live') {
                dot.classList.add('live');
                label.innerText = "LIVE NOW";
                label.style.color = "#ff0000";
            } else {
                dot.classList.remove('live');
                label.innerText = "OFF AIR";
                label.style.color = "#8b949e";
            }
        });

        // Background check every 2 minutes
        setInterval(() => {
            viewer.getProperty('isLive', (isLive) => {
                const dot = document.getElementById('live-dot');
                const label = document.getElementById('status-label');
                if (isLive) {
                    dot.classList.add('live');
                    label.innerText = "LIVE NOW";
                } else {
                    dot.classList.remove('live');
                    label.innerText = "OFF AIR";
                }
            });
        }, 120000);
    </script>
</body>
</html>
