<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threads API Laboratory v2.2.0</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --green: #238636; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .lab-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 520px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 4px solid #f85149; margin-bottom: 25px; }
        .number { font-size: 5.5rem; font-weight: 800; margin: 15px 0; color: #444; transition: 0.5s; }
        .number.found { color: var(--green); text-shadow: 0 0 25px rgba(35, 134, 54, 0.5); }
        .console { width: 100%; max-width: 850px; background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; border-radius: 12px; font-size: 13px; height: 380px; overflow-y: auto; border: 1px solid #333; }
        button { background: #1f6feb; color: white; border: none; padding: 14px 28px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        button:hover { filter: brightness(1.2); }
        .json-box { color: #58a6ff; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

    <div class="lab-card">
        <div style="font-size: 11px; color: #8b949e; margin-bottom: 5px;">2026 THREADS NODE SCAN</div>
        <div class="number" id="count">SCAN</div>
        <button onclick="runFieldForce()">RUN FIELD-FORCE SCAN</button>
    </div>

    <div class="console" id="debug-console">> Lab v2.2.0 Online... <br>> Standing by for Multi-Field Scan.</div>

    <script>
        const T_ID = "26231664763158295";
        const T_TOKEN = "THAAg36cTPHF1BUVNENF9FUkYyNzlwQktTck9faWhYS01rWVlwVk45QW94bDVwNEZAQWVlHSTlfZAU1XTXMtQ2ZA4QzRHbHdodENzRUQ4VU9WOURDSmwzUFlxMWo2QVdVSlVsZATBFNXdjeFJLZAnZAuWmtMeU9TNnFsTVJVMXhCRExiR0FGQQZDZD";

        function log(msg, color = "#0f0") {
            const con = document.getElementById('debug-console');
            con.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
            con.scrollTop = con.scrollHeight;
        }

        async function runFieldForce() {
            log("--- STARTING MULTI-FIELD SCAN ---", "yellow");
            const countEl = document.getElementById('count');
            
            // Testing 2026 variations
            const variants = ["follower_count", "followers_count", "threads_followers", "total_followers"];
            
            for (let field of variants) {
                log(`Testing Field: [${field}]...`);
                try {
                    const res = await fetch(`https://graph.threads.net/v1.0/${T_ID}?fields=${field}&access_token=${T_TOKEN}`);
                    const data = await res.json();
                    
                    if (data[field] !== undefined) {
                        log(`SUCCESS! Found Field: ${field}`, "#238636");
                        log(`RAW DATA: <span class="json-box">${JSON.stringify(data)}</span>`);
                        countEl.innerText = data[field];
                        countEl.classList.add('found');
                        return;
                    } else {
                        log(`REJECTED [${field}]: ${data.error.message}`, "#444");
                    }
                } catch(e) { log(`Network Error on ${field}`, "red"); }
            }
            
            log("--- SCAN COMPLETE: ALL FIELDS REJECTED ---", "red");
            log("CRITICAL HINT: Ensure your account is set to 'Public' and 'Professional' in the App.", "orange");
        }
    </script>
</body>
</html>
