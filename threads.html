<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threads API Laboratory v1.2.0</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .lab-card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 40px; width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .number { font-size: 5rem; font-weight: 800; margin: 20px 0; color: #238636; }
        .status { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #8b949e; }
        .console { margin-top: 30px; width: 100%; max-width: 700px; background: black; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 8px; font-size: 13px; text-align: left; overflow-y: auto; height: 300px; border: 1px solid #333; }
        button { background: #238636; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #2ea043; transform: scale(1.05); }
        .badge { position: absolute; top: 15px; right: 15px; background: #1f6feb; font-size: 10px; padding: 4px 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="lab-card">
        <div class="badge">v1.2.0 DEEP SCAN</div>
        <div class="status" id="status-text">Ready for Diagnostic</div>
        <div class="number" id="count">--</div>
        <button onclick="startDeepScan()">Initialize Deep Scan</button>
    </div>

    <div class="console" id="debug-console">
        > System Online...<br>
        > Node ID: 26231664763158295 detected.<br>
        > Standing by for manual override...
    </div>

    <script>
        const T_ID = "26231664763158295"; 
        const T_TOKEN = "THAAg36cTPHF1BUVNObmpNX1NmeWFyYXk2UHVfc29YYWU0SFI3QkRRc0luNnZAFcVNhS2RBdnhBV3VhOU9MV0JpZAWI2ZAGY4TmxaajhyN1NlSDJvQndYS3VteTRzZAU9jMDRPYS1kSnNvTDAtWWtqeUk5dmhZAa0gtd09ocmk0V09RVEQ1ZA3pqSk41TmFKbTA0d3FXampsOEJMamR1UWpHMG9MQzc3a2QZD";

        function log(msg, color = "#00ff00") {
            const con = document.getElementById('debug-console');
            con.innerHTML += `<br><span style="color: ${color}">> ${msg}</span>`;
            con.scrollTop = con.scrollHeight;
        }

        async function startDeepScan() {
            const countEl = document.getElementById('count');
            const statusEl = document.getElementById('status-text');
            
            // List of all possible 2026 follower-related fields
            const fields = [
                "followers_count", 
                "follower_count", 
                "threads_followers_count", 
                "insights.metric(follower_count)",
                "statistics"
            ];
            
            log("DIAGNOSTIC START: Testing Meta Graph Nodes...", "yellow");

            for (let f of fields) {
                log(`Testing Endpoint Field: [${f}]...`);
                try {
                    const url = `https://graph.threads.net/v1.0/${T_ID}?fields=${f}&access_token=${T_TOKEN}`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data[f] !== undefined || (data.insights && data.insights.data)) {
                        let finalVal = data[f] || "Check Insights";
                        countEl.innerText = finalVal;
                        statusEl.innerText = "MATCH FOUND";
                        log(`CRITICAL SUCCESS: Field '${f}' is valid.`, "#238636");
                        log(`DATA: ${JSON.stringify(data)}`, "cyan");
