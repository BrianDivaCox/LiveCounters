<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threads API Laboratory v1.3.0</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .lab-card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 30px; width: 500px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .number { font-size: 4rem; font-weight: 800; margin: 15px 0; color: #238636; }
        .console { width: 100%; max-width: 800px; background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; border-radius: 10px; font-size: 13px; text-align: left; height: 350px; overflow-y: auto; border: 1px solid #333; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { background: #238636; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.alt { background: #1f6feb; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .json-out { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="lab-card">
        <div style="font-size: 10px; color: #8b949e; margin-bottom: 10px;">THREADS ID: 26231664763158295</div>
        <div id="status-text">SYSTEM STANDBY</div>
        <div class="number" id="count">--</div>
        <div class="btn-group">
            <button onclick="runDiagnostic()">Run Diagnostic</button>
            <button class="alt" onclick="clearConsole()">Clear Logs</button>
        </div>
    </div>

    <div class="console" id="debug-console">> Initializing Lab v1.3.0...</div>

    <script>
        const T_ID = "26231664763158295";
        const T_TOKEN = "THAAg36cTPHF1BUVNObmpNX1NmeWFyYXk2UHVfc29YYWU0SFI3QkRRc0luNnZAFcVNhS2RBdnhBV3VhOU9MV0JpZAWI2ZAGY4TmxaajhyN1NlSDJvQndYS3VteTRzZAU9jMDRPYS1kSnNvTDAtWWtqeUk5dmhZAa0gtd09ocmk0V09RVEQ1ZA3pqSk41TmFKbTA0d3FXampsOEJMamR1UWpHMG9MQzc3a2QZD";

        function log(msg, color = "#0f0") {
            const con = document.getElementById('debug-console');
            con.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
            con.scrollTop = con.scrollHeight;
        }

        async function runDiagnostic() {
            log("DIAGNOSTIC START...", "yellow");
            
            // Step 1: Check basic profile existence
            log("Step 1: Testing basic node connectivity...");
            try {
                const res = await fetch(`https://graph.threads.net/v1.0/${T_ID}?fields=id,username,name&access_token=${T_TOKEN}`);
                const data = await res.json();
                
                if (data.username) {
                    log(`CONNECTED: Found user @${data.username} (${data.name})`, "#238636");
                    log(`RAW JSON: <span class="json-out">${JSON.stringify(data)}</span>`);
                } else {
                    log(`ERROR: ${data.error.message}`, "red");
                    return;
                }
            } catch(e) { log("Connection Blocked.", "red"); }

            // Step 2: Test 2026 Follower Insight Node
            log("Step 2: Testing Follower Insight Edge...");
            try {
                const res = await fetch(`https://graph.threads.net/v1.0/${T_ID}?fields=follower_count&access_token=${T_TOKEN}`);
                const data = await res.json();
                
                if (data.follower_count !== undefined) {
                    log(`MATCH! Follower Count: ${data.follower_count}`, "#238636");
                    document.getElementById('count').innerText = data.follower_count;
                } else {
                    log(`FIELD REJECTED: Account might not be set to 'Professional'.`, "orange");
                    log(`RAW REJECTION: <span class="json-out">${JSON.stringify(data)}</span>`);
                }
            } catch(e) {}
        }

        function clearConsole() {
            document.getElementById('debug-console').innerHTML = "> Console Cleared.";
        }
    </script>
</body>
</html>
