<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threads API Laboratory v2.5.0</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --green: #238636; --blue: #1f6feb; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 900px; margin-bottom: 30px; }
        
        .lab-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .lab-card.followers { border-top: 4px solid var(--green); }
        .lab-card.views { border-top: 4px solid var(--blue); }
        
        .number { font-size: 4rem; font-weight: 800; margin: 10px 0; color: #444; transition: 0.5s; }
        .number.active { color: var(--text); text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        
        .label { font-size: 11px; text-transform: uppercase; color: #8b949e; letter-spacing: 2px; }
        
        .console { width: 100%; max-width: 900px; background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; border-radius: 12px; font-size: 13px; height: 300px; overflow-y: auto; border: 1px solid #333; }
        
        button { background: var(--green); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>

        <div class="lab-card followers">
            <div class="label">Followers</div>
            <div class="number" id="follower-num">---</div>
        </div>

        <div class="lab-card views">
            <div class="label">30-Day Views</div>
            <div class="number" id="view-num">---</div>
        </div>
    </div>

    <div class="console" id="debug-console">> Lab v2.5.0 Online... <br>> Ready to scan for View Metrics.</div>
