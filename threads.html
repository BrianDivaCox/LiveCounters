<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threads API Laboratory v2.6.0</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --green: #238636; --blue: #1f6feb; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-bottom: 20px; }
        .lab-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .lab-card.followers { border-top: 4px solid var(--green); }
        .lab-card.views { border-top: 4px solid var(--blue); }
        
        .number { font-size: 3.5rem; font-weight: 800; margin: 10px 0; color: #333; }
        .number.active { color: var(--text); text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .label { font-size: 10px; text-transform: uppercase; color: #8b949e; letter-spacing: 1px; }
        
        .control-panel { background: #090c10; border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: 100%; max-width: 860px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        #token-input { background: #000; border: 1px solid #444; color: #0f0; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; width: 97%; }
        
        .console { width: 100%; max-width: 860px; background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; border-radius: 10px; font-size: 12px; height: 250px; overflow-y: auto; border: 1px solid #333; }
        
        .btn { background: var(--green); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; }
        .btn:active { transform: scale(0.98); }
        .btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">Threads Insight Diagnostic (v2.6.0)</h2>

    <div class="control-panel">
        <div style="font-size: 11px; color: #8b949e;">CURRENT API TOKEN:</div>
        <input type="text" id="token-input" value
